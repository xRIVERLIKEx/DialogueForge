        const generateDefaultSkin = (colorHex) => {
          const canvas = document.createElement('canvas');
          canvas.width = 64; canvas.height = 64;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = colorHex;
          ctx.fillRect(0, 0, 32, 16); ctx.fillRect(16, 16, 24, 16);
          ctx.fillRect(40, 16, 16, 16); ctx.fillRect(32, 48, 16, 16);
          ctx.fillRect(0, 16, 16, 16); ctx.fillRect(16, 48, 16, 16);
          return canvas.toDataURL();
        };

        const generatePackIcon = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(0,0,128,128); 
            ctx.fillStyle = '#000000';
            
            // Top border
            ctx.fillRect(24, 16, 80, 8); 
            
            // Bottom border (with gap for the tail)
            ctx.fillRect(24, 80, 48, 8); 
            ctx.fillRect(88, 80, 16, 8); 
            
            // Left and Right borders
            ctx.fillRect(16, 24, 8, 56); 
            ctx.fillRect(104, 24, 8, 56);
            
            // 4 Corners
            ctx.fillRect(20, 20, 4, 4); 
            ctx.fillRect(104, 20, 4, 4); 
            ctx.fillRect(20, 80, 4, 4); 
            ctx.fillRect(104, 80, 4, 4);
            
            // Redrawn clean Speech Bubble Tail (Pointing down-right)
            ctx.fillRect(72, 88, 8, 8);
            ctx.fillRect(80, 96, 8, 8);
            ctx.fillRect(88, 88, 8, 24); // Solid right edge of tail
            
            // The 3 ellipsis dots inside the bubble
            ctx.fillRect(40, 48, 12, 12); 
            ctx.fillRect(60, 48, 12, 12); 
            ctx.fillRect(80, 48, 12, 12);
            
            return canvas.toDataURL().split(',')[1];
        };

        const SkinViewer = ({ skinUrl, animation = "walk", camX = 20, camY = 15, camZ = 40, zoom = 0.8, width = 250, height = 350, hideBadge = false }) => {
          const viewerRef = useRef(null);
          const skinViewerInstance = useRef(null);
          const [scriptLoaded, setScriptLoaded] = useState(!!window.skinview3d);

          useEffect(() => {
            if (window.skinview3d) {
              setScriptLoaded(true);
              return;
            }
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/bundles/skinview3d.bundle.js";
            script.async = true;
            script.onload = () => setScriptLoaded(true);
            document.head.appendChild(script);
          }, []);

          useEffect(() => {
            if (!scriptLoaded || !viewerRef.current) return;

            if (!skinViewerInstance.current) {
              skinViewerInstance.current = new window.skinview3d.SkinViewer({
                canvas: viewerRef.current,
                width: width,
                height: height,
                preserveDrawingBuffer: true
              });
            }
            
            skinViewerInstance.current.camera.position.set(camX, camY, camZ);
            skinViewerInstance.current.zoom = zoom;
            
          }, [scriptLoaded, camX, camY, camZ, zoom, width, height]);

          useEffect(() => {
            if (!scriptLoaded || !skinViewerInstance.current) return;
            skinViewerInstance.current.loadSkin(skinUrl).catch(err => console.warn("Failed to load skin:", err));
            
            if (animation === "walk") {
              skinViewerInstance.current.animation = new window.skinview3d.WalkingAnimation();
            } else if (animation === "idle") {
              skinViewerInstance.current.animation = new window.skinview3d.IdleAnimation();
            } else {
              skinViewerInstance.current.animation = null;
            }
          }, [scriptLoaded, skinUrl, animation]);

          useEffect(() => {
            return () => {
              if (skinViewerInstance.current) {
                skinViewerInstance.current.dispose();
                skinViewerInstance.current = null;
              }
            };
          }, []);

          return (
            <div className="relative group w-full h-full">
              <canvas ref={viewerRef} className="w-full h-full block rounded-lg" />
              {!hideBadge && (
                <div className="absolute bottom-2 right-2 opacity-50 group-hover:opacity-100 transition-opacity pointer-events-none">
                  <span className="bg-black/80 text-[10px] text-white px-2 py-1 rounded">3D Interactive</span>
                </div>
              )}
            </div>
          );
        };

        function App() {
          const [packName, setPackName] = useState('');
          const [nameError, setNameError] = useState(false);
          const [isDraggingSkin, setIsDraggingSkin] = useState(false);
          
          const [cast, setCast] = useState([
            { id: 'char_1', name: 'My NPC', skinUrl: generateDefaultSkin(defaultColors[0]), eggBase: '#EAB308', eggOverlay: '#111111' }
          ]);
          const [activeActorId, setActiveActorId] = useState('char_1');
          
          const activeActor = cast.find(a => a.id === activeActorId) || cast[0];

          const [nodes, setNodes] = useState([]);
          const [edges, setEdges] = useState([]);
          
          const [nodeHeights, setNodeHeights] = useState({});
          
          const [selectedNode, setSelectedNode] = useState(null);
          const [selectedEdge, setSelectedEdge] = useState(null);

          const [showPreview, setShowPreview] = useState(false);
          const [previewSceneId, setPreviewSceneId] = useState('start_scene');
          
          const [isExporting, setIsExporting] = useState(false);
          const [pdfMode, setPdfMode] = useState(false);

          const canvasContainerRef = useRef(null);
          const [zoom, setZoom] = useState(1);
          const [pan, setPan] = useState({ x: 0, y: 0 });
          const [isPanning, setIsPanning] = useState(false);

          const [draggingNode, setDraggingNode] = useState(null);
          const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
          const [connectingFrom, setConnectingFrom] = useState(null);
          const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

          useEffect(() => {
             const screenWidth = window.innerWidth || 1200;
             const canvasWidth = screenWidth - 640; 
             const centerNodeX = Math.max(100, (canvasWidth / 2) - 128); 
             
             setNodes([{ 
                 id: 'start_scene', 
                 data: { text: 'Click here to edit this starting dialogue.', speakerId: 'char_1', isStart: true, hasCloseButton: false, closeButtonLabel: 'Leave', despawnCast: false }, 
                 position: { x: centerNodeX, y: 80 } 
             }]);
          }, []);

          useEffect(() => {
            const observer = new ResizeObserver((entries) => {
                setNodeHeights(prev => {
                    let changed = false;
                    const next = { ...prev };
                    for (let entry of entries) {
                        const el = entry.target;
                        const id = el.id.replace('node_', '');
                        const h = el.offsetHeight;
                        if (next[id] !== h) {
                            next[id] = h;
                            changed = true;
                        }
                    }
                    return changed ? next : prev;
                });
            });

            nodes.forEach(n => {
                const el = document.getElementById(`node_${n.id}`);
                if (el) observer.observe(el);
            });

            return () => observer.disconnect();
          }, [nodes]);

          const handleCanvasMouseDown = (e) => {
            if (e.target === canvasContainerRef.current || e.target.tagName === 'DIV') {
              setIsPanning(true);
            }
            setSelectedNode(null);
            setSelectedEdge(null);
          };

          const handleWheel = (e) => {
            if (e.ctrlKey || e.metaKey || pdfMode) return; 
            const zoomSensitivity = 0.001;
            const delta = -e.deltaY * zoomSensitivity;
            setZoom(z => Math.min(Math.max(0.2, z + delta), 2));
          };

          const fitView = (currentNodes = nodes) => {
            if (currentNodes.length === 0 || !canvasContainerRef.current) return;
            const minX = Math.min(...currentNodes.map(n => n.position.x));
            const maxX = Math.max(...currentNodes.map(n => n.position.x)) + 256;
            const minY = Math.min(...currentNodes.map(n => n.position.y));
            const maxY = Math.max(...currentNodes.map(n => n.position.y)) + 144;
            
            const graphWidth = maxX - minX;
            const graphHeight = maxY - minY;
            const containerRect = canvasContainerRef.current.getBoundingClientRect();
            
            const zoomX = (containerRect.width - 100) / graphWidth;
            const zoomY = (containerRect.height - 100) / graphHeight;
            const newZoom = Math.min(Math.max(0.2, Math.min(zoomX, zoomY)), 1);
            setZoom(newZoom);
            
            const centerX = minX + (graphWidth / 2);
            const centerY = minY + (graphHeight / 2);
            setPan({
                x: (containerRect.width / 2) - (centerX * newZoom),
                y: (containerRect.height / 2) - (centerY * newZoom)
            });
          };

          const handleMouseMove = (e) => {
            if (!canvasContainerRef.current || pdfMode) return;
            
            if (isPanning) {
              setPan(p => ({ x: p.x + e.movementX, y: p.y + e.movementY }));
              return;
            }

            const rect = canvasContainerRef.current.getBoundingClientRect();
            const logicalX = (e.clientX - rect.left - pan.x) / zoom;
            const logicalY = (e.clientY - rect.top - pan.y) / zoom;
            setMousePos({ x: logicalX, y: logicalY });

            if (draggingNode) {
              setNodes(nds => nds.map(n => n.id === draggingNode ? {
                ...n, position: { x: logicalX - dragOffset.x, y: logicalY - dragOffset.y }
              } : n));
            }
          };

          const handleNodeMouseDown = (e, node) => {
            e.stopPropagation();
            setSelectedNode(node);
            setSelectedEdge(null);
            
            if (!canvasContainerRef.current) return;
            const rect = canvasContainerRef.current.getBoundingClientRect();
            const logicalX = (e.clientX - rect.left - pan.x) / zoom;
            const logicalY = (e.clientY - rect.top - pan.y) / zoom;
            
            setDraggingNode(node.id);
            setDragOffset({ x: logicalX - node.position.x, y: logicalY - node.position.y });
          };

          const handleSourceMouseDown = (e, nodeId) => {
            e.stopPropagation();
            setConnectingFrom(nodeId);
          };

          const handleTargetMouseUp = (e, nodeId) => {
            e.stopPropagation();
            if (connectingFrom && connectingFrom !== nodeId) {
              const newEdge = {
                id: `edge_${Date.now()}`,
                source: connectingFrom,
                target: nodeId,
                data: { label: 'Continue', giveItem: '', soundId: '', commands: '', despawnCast: false }
              };
              setEdges(eds => [...eds, newEdge]);
              setSelectedEdge(newEdge);
              setSelectedNode(null);
            }
            setConnectingFrom(null);
          };
          
          const handleMouseUp = (e) => {
            // Drag-and-drop auto-node generation
            if (connectingFrom && e?.type === 'mouseup') {
              const hash = Math.random().toString(36).substring(2, 6);
              const newNodeId = `scene_${hash}`;
              
              const newNode = {
                id: newNodeId,
                data: { text: 'Click to edit this new dialogue.', speakerId: activeActorId, hasCloseButton: false, closeButtonLabel: 'Goodbye', despawnCast: false },
                position: { x: mousePos.x - 128, y: mousePos.y - 72 },
              };
              
              const newEdge = {
                id: `edge_${Date.now()}`,
                source: connectingFrom,
                target: newNodeId,
                data: { label: 'Continue', giveItem: '', soundId: '', commands: '', despawnCast: false }
              };

              setNodes(nds => [...nds, newNode]);
              setEdges(eds => [...eds, newEdge]);
              setSelectedNode(newNode);
              setSelectedEdge(null);
            }

            setDraggingNode(null);
            setConnectingFrom(null);
            setIsPanning(false);
          };

          const handleAddActor = () => {
            if (cast.length >= 4) return;
            const newId = `char_${Date.now()}`;
            const newColor = defaultColors[cast.length];
            setCast([...cast, { id: newId, name: `NPC ${cast.length + 1}`, skinUrl: generateDefaultSkin(newColor), eggBase: newColor, eggOverlay: '#111111' }]);
            setActiveActorId(newId);
          };

          const updateActiveActor = (updates) => {
            setCast(cast.map(c => c.id === activeActorId ? { ...c, ...updates } : c));
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (event) => {
                updateActiveActor({ skinUrl: event.target.result });
                e.target.value = null; 
              };
              reader.readAsDataURL(file);
            }
          };

          const handleSkinDrop = (e) => {
            e.preventDefault();
            setIsDraggingSkin(false);
            const file = e.dataTransfer.files[0];
            if (file && (file.type === "image/png" || file.name.toLowerCase().endsWith('.png'))) {
              const reader = new FileReader();
              reader.onload = (event) => {
                updateActiveActor({ skinUrl: event.target.result });
              };
              reader.readAsDataURL(file);
            }
          };

          const updateNodeData = (id, newData) => {
            let updated = null;
            setNodes((nds) => nds.map((n) => {
              if (n.id === id) {
                updated = { ...n, data: { ...n.data, ...newData } };
                return updated;
              }
              return n;
            }));
            if (selectedNode?.id === id && updated) setSelectedNode(updated);
          };

          const updateEdgeData = (id, newData) => {
            let updated = null;
            setEdges((eds) => eds.map((e) => {
              if (e.id === id) {
                updated = { ...e, data: { ...e.data, ...newData } };
                return updated;
              }
              return e;
            }));
            if (selectedEdge?.id === id && updated) setSelectedEdge(updated);
          };

          const addDialogueNode = () => {
            const hash = Math.random().toString(36).substring(2, 6);
            const id = `scene_${hash}`;
            const scatterX = (Math.random() * 60) - 30;
            const scatterY = (Math.random() * 60) - 30;
            const rect = canvasContainerRef.current.getBoundingClientRect();
            const spawnX = ((rect.width / 2) - pan.x) / zoom - 128 + scatterX;
            const spawnY = ((rect.height / 2) - pan.y) / zoom - 72 + scatterY;

            const newNode = {
              id,
              data: { text: 'Click to edit this new dialogue.', speakerId: activeActorId, hasCloseButton: false, closeButtonLabel: 'Goodbye', despawnCast: false },
              position: { x: spawnX, y: spawnY },
            };
            setNodes((nds) => nds.concat(newNode));
          };

          const autoLayout = () => {
            if (nodes.length === 0) return;
            const children = {};
            edges.forEach(e => {
              if (!children[e.source]) children[e.source] = [];
              children[e.source].push(e.target);
            });

            const levels = {};
            const visited = new Set();
            const queue = [];

            const startNode = nodes.find(n => n.data.isStart) || nodes[0];
            queue.push({ id: startNode.id, level: 0 });

            while (queue.length > 0) {
              const { id, level } = queue.shift();
              if (!visited.has(id)) {
                visited.add(id);
                levels[id] = level;
                const nodeChildren = children[id] || [];
                nodeChildren.forEach(childId => queue.push({ id: childId, level: level + 1 }));
              }
            }

            let maxLevel = Math.max(...Object.values(levels), 0);
            nodes.forEach(n => {
              if (!visited.has(n.id)) { maxLevel++; levels[n.id] = maxLevel; }
            });

            const levelGroups = {};
            nodes.forEach(n => {
              const lvl = levels[n.id];
              if (!levelGroups[lvl]) levelGroups[lvl] = [];
              levelGroups[lvl].push(n);
            });

            const NODE_WIDTH = 450; 
            const NODE_HEIGHT = 400;

            const newNodes = nodes.map(node => {
              const lvl = levels[node.id];
              const group = levelGroups[lvl];
              const index = group.findIndex(n => n.id === node.id);
              const totalWidth = group.length * NODE_WIDTH;
              const startX = -(totalWidth / 2);

              return { 
                ...node, 
                position: { x: startX + (index * NODE_WIDTH), y: lvl * NODE_HEIGHT } 
              };
            });

            setNodes(newNodes);
            setTimeout(() => fitView(newNodes), 50);
          };

          const exportPDF = async () => {
            if (!packName || packName.trim() === '') {
                setNameError(true);
                return;
            }
            if (!window.jspdf || !window.html2canvas) {
                console.warn("PDF libraries loading...");
                return;
            }
            setIsExporting(true);
            autoLayout();
            
            setTimeout(() => {
                setPdfMode(true);
                setSelectedNode(null);
                setSelectedEdge(null);
                
                setTimeout(async () => {
                    try {
                        const canvasEl = document.getElementById('pdf-capture-area');
                        const canvasImage = await window.html2canvas(canvasEl, {
                            backgroundColor: '#ffffff',
                            scale: 2, 
                            useCORS: true,
                            logging: false
                        });

                        const imgData = canvasImage.toDataURL('image/jpeg', 0.95);
                        const imgWidth = canvasImage.width;
                        const imgHeight = canvasImage.height;
                        
                        const pdf = new window.jspdf.jsPDF({
                            orientation: imgWidth > imgHeight ? 'l' : 'p',
                            unit: 'px',
                            format: [imgWidth, imgHeight]
                        });
                        
                        pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
                        pdf.save(`${packName.replace(/\s+/g, '_')}_Dialogue_Blueprint.pdf`);
                    } catch (error) {
                        console.error("PDF Generation Error:", error);
                    } finally {
                        setPdfMode(false);
                        setIsExporting(false);
                    }
                }, 2000); 
            }, 600);
          };

          const exportAddon = async () => {
            if (!packName || packName.trim() === '') {
                setNameError(true);
                return;
            }
            
            setIsExporting(true);
            try {
                const zip = new window.JSZip();
                
                const bpUuid1 = generateUUID(); const bpUuid2 = generateUUID();
                const rpUuid1 = generateUUID(); const rpUuid2 = generateUUID();
                const hash = Math.random().toString(36).substring(2, 6);
                const safeName = (packName || "custom").toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + hash;

                const bpFolder = zip.folder(`${packName.replace(/\s+/g, '_')}_BP`);
                const rpFolder = zip.folder(`${packName.replace(/\s+/g, '_')}_RP`);

                const packIconBase64 = generatePackIcon();
                
                bpFolder.file("manifest.json", JSON.stringify({
                  format_version: 2,
                  header: { name: `${packName} BP`, description: "Multi-NPC Dialogue Tree", uuid: bpUuid1, version: [1, 0, 0], min_engine_version: [1, 20, 0] },
                  modules: [ { type: "data", uuid: bpUuid2, version: [1, 0, 0] } ],
                  dependencies: [ { uuid: rpUuid1, version: [1, 0, 0] } ]
                }, null, 2));
                bpFolder.file("pack_icon.png", packIconBase64, {base64: true});

                rpFolder.file("manifest.json", JSON.stringify({
                  format_version: 2,
                  header: { name: `${packName} RP`, description: "NPC Visuals and Skins", uuid: rpUuid1, version: [1, 0, 0], min_engine_version: [1, 20, 0] },
                  modules: [ { type: "resources", uuid: rpUuid2, version: [1, 0, 0] } ]
                }, null, 2));
                rpFolder.file("pack_icon.png", packIconBase64, {base64: true});

                let langFileStr = '';

                const startNode = nodes.find(n => n.data.isStart) || nodes[0];
                const questGiver = cast.find(c => c.id === startNode.data.speakerId) || cast[0];

                for (const actor of cast) {
                  const entityId = `forge:${safeName}_${actor.id}`;
                  const fileName = `${safeName}_${actor.id}`;
                  const isQuestGiver = actor.id === questGiver.id;

                  langFileStr += `item.spawn_egg.entity.${entityId}.name=${actor.name}\nentity.${entityId}.name=${actor.name}\n`;

                  let interactionCommands = [];
                  if (isQuestGiver) {
                      interactionCommands = [
                          "event entity @s forge:play_talking",
                          `dialogue open @s @p ${safeName}_${startNode.id}`
                      ];
                  } else {
                      interactionCommands = [
                          `event entity @e[type=forge:${safeName}_${questGiver.id},r=50,c=1] forge:play_talking`,
                          `dialogue open @e[type=forge:${safeName}_${questGiver.id},r=50,c=1] @p ${safeName}_${startNode.id}`
                      ];
                  }

                  bpFolder.file(`entities/${fileName}.json`, JSON.stringify({
                    format_version: "1.20.0",
                    "minecraft:entity": {
                      description: { identifier: entityId, is_spawnable: true, is_summonable: true, is_experimental: false },
                      components: {
                        "minecraft:collision_box": { "width": 0.6, "height": 1.9 },
                        "minecraft:health": { "value": 1, "max": 1 },
                        "minecraft:physics": { "has_gravity": true, "has_collision": true },
                        "minecraft:pushable": { "is_pushable": false, "is_pushable_by_piston": false },
                        "minecraft:damage_sensor": {
                          "triggers": [
                            {
                              "on_damage": {
                                "filters": { "test": "has_ability", "subject": "other", "value": "worldbuilder" }
                              },
                              "deals_damage": true
                            },
                            {
                              "cause": "all",
                              "deals_damage": false
                            }
                          ]
                        },
                        "minecraft:nameable": { "always_show": true, "allow_name_tags": true },
                        "minecraft:behavior.look_at_player": { "priority": 1, "look_distance": 8, "probability": 1.0 },
                        "minecraft:type_family": { "family": ["npc", "mob"] },
                        "minecraft:interact": {
                          "interactions": [
                            {
                              "on_interact": {
                                "filters": { "test": "is_family", "subject": "other", "value": "player" },
                                "event": `${entityId}:start_dialogue`,
                                "target": "self"
                              },
                              "interact_text": "Talk"
                            }
                          ]
                        }
                      },
                      component_groups: {
                        "forge:npc_init": {
                          "minecraft:npc": {}
                        },
                        "forge:despawn_task": {
                          "minecraft:instant_despawn": {}
                        }
                      },
                      events: {
                        "minecraft:entity_spawned": {
                          "sequence": [
                            {
                              "add": {
                                "component_groups": ["forge:npc_init", "forge:despawn_task"]
                              }
                            },
                            {
                              "filters": { "test": "has_ability", "subject": "nearest_player", "value": "worldbuilder" },
                              "remove": {
                                "component_groups": ["forge:despawn_task"]
                              }
                            }
                          ]
                        },
                        [`${entityId}:start_dialogue`]: {
                          "queue_command": {
                            "command": interactionCommands
                          }
                        },
                        "forge:play_talking": {
                          "queue_command": {
                            "command": [
                              "playanimation @s talking default 0"
                            ]
                          }
                        },
                        "forge:trigger_despawn": {
                          "add": {
                            "component_groups": ["forge:despawn_task"]
                          }
                        }
                      }
                    }
                  }, null, 2));

                  rpFolder.file(`entity/${fileName}.entity.json`, JSON.stringify({
                    format_version: "1.20.0",
                    "minecraft:client_entity": {
                      description: {
                        identifier: entityId,
                        materials: { default: "entity_alphatest" },
                        textures: { default: `textures/entity/${fileName}` },
                        geometry: { default: "geometry.humanoid.custom" },
                        scripts: {
                          pre_animation: [ "variable.tcos0 = (Math.cos(query.modified_distance_moved * 38.17) * query.modified_move_speed / variable.gliding_speed_value) * 57.3;" ],
                          animate: [ "look_at_target", "move" ]
                        },
                        animations: {
                          look_at_target: "animation.humanoid.look_at_target",
                          move: "animation.humanoid.move",
                          talking: "animation.npc.speech"
                        },
                        render_controllers: [ "controller.render.default" ],
                        spawn_egg: {
                          base_color: actor.eggBase,
                          overlay_color: actor.eggOverlay
                        }
                      }
                    }
                  }, null, 2));

                  rpFolder.file(`animations/${fileName}.animation.json`, JSON.stringify({
                    "format_version": "1.8.0",
                    "animations": {
                      "animation.npc.speech": {
                        "animation_length": 2,
                        "bones": {
                          "head": {
                            "rotation": { "0.0": [5.0, -2.5, 0], "0.25": [12.5, 2.4, 0.6], "0.5": [-2.5, 0, 0], "0.75": [5.0, -2.5, 0], "1.0": [12.5, -2.5, 0], "1.25": [-2.5, 2.4, -0.3], "1.5": [5.0, -2.5, 0], "1.75": [12.4, -4.9, -0.2], "2.0": [-2.5, 0, 0] }
                          },
                          "rightArm": {
                            "rotation": { "0.0": [10, 0, 0], "0.25": [-7.3, 2.2, 7.1], "0.5": [-6.9, 4.4, 14.3], "0.75": [-7.4, 3.2, 6.9], "1.0": [-17.2, 4.3, 9.1], "1.25": [-9.7, 4.3, 9.1], "1.5": [-9.9, 3.4, 6.7], "1.75": [-17.4, 3.4, 6.7], "2.0": [10, 0, 0] }
                          },
                          "leftArm": {
                            "rotation": { "0.0": [-12.4, 0, 0], "0.25": [-39.9, -0.1, -17.4], "0.5": [-59.9, -0.1, -17.4], "0.75": [-49.9, -0.1, -17.4], "1.0": [-52.2, -4.7, -23.4], "1.25": [-57.2, -4.7, -23.4], "1.5": [-59.8, 0.7, -18.3], "1.75": [-49.8, 0.7, -18.3], "2.0": [-12.4, 0, 0] }
                          }
                        }
                      }
                    }
                  }, null, 2));

                  const res = await fetch(actor.skinUrl);
                  const skinBlob = await res.blob();
                  rpFolder.file(`textures/entity/${fileName}.png`, skinBlob);
                }

                rpFolder.file("texts/en_US.lang", langFileStr);

                const getDespawnCommands = () => {
                    const cmds = [];
                    cast.forEach(a => {
                        cmds.push(`/tp @e[type=forge:${safeName}_${a.id}] ~ ~-20 ~`);
                        cmds.push(`/event entity @e[type=forge:${safeName}_${a.id}] forge:trigger_despawn`);
                    });
                    return cmds;
                };

                const dialogueScenes = nodes.map(node => {
                  const currentActor = cast.find(c => c.id === node.data.speakerId) || cast[0];
                  const outgoingEdges = edges.filter(e => e.source === node.id);
                  
                  const buttons = outgoingEdges.map(e => {
                    const targetNode = nodes.find(n => n.id === e.target);
                    const targetActor = cast.find(c => c.id === targetNode.data.speakerId) || cast[0];
                    
                    const customCommands = e.data.commands ? e.data.commands.split('\n').filter(cmd => cmd.trim() !== '') : [];
                    const generatedCommands = [];
                    if (e.data.giveItem) generatedCommands.push(`/give @p ${e.data.giveItem}`);
                    if (e.data.soundId) generatedCommands.push(`/playsound ${e.data.soundId} @p`);
                    
                    let finalCommands = [];
                    if (e.data.despawnCast) {
                        finalCommands = [
                            ...generatedCommands,
                            ...customCommands,
                            ...getDespawnCommands()
                        ];
                    } else {
                        finalCommands = [ 
                            `/event entity @e[type=forge:${safeName}_${targetActor.id},r=50,c=1] forge:play_talking`,
                            `/dialogue open @e[type=forge:${safeName}_${targetActor.id},r=50,c=1] @p ${safeName}_${targetNode.id}`, 
                            ...generatedCommands,
                            ...customCommands 
                        ];
                    }

                    return {
                      name: e.data.label || "Continue",
                      commands: finalCommands
                    };
                  });

                  if (node.data.hasCloseButton || outgoingEdges.length === 0) {
                    const closeBtn = {
                        name: node.data.closeButtonLabel || "Goodbye"
                    };
                    if (node.data.despawnCast) {
                        closeBtn.commands = getDespawnCommands();
                    }
                    buttons.push(closeBtn);
                  }

                  return {
                    scene_tag: `${safeName}_${node.id}`,
                    npc_name: currentActor.name,
                    text: node.data.text,
                    buttons: buttons.length > 0 ? buttons : undefined
                  };
                });

                bpFolder.file(`dialogue/scenes.json`, JSON.stringify({
                  format_version: "1.17",
                  "minecraft:npc_dialogue": { scenes: dialogueScenes }
                }, null, 2));

                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${packName.replace(/\s+/g, '_')}.mcaddon`;
                link.click();
            } catch (err) {
                console.error("Failed to generate addon:", err);
            } finally {
                setIsExporting(false);
            }
          };

          const currentPreviewNode = nodes.find(n => n.id === previewSceneId) || nodes[0];
          const previewOptions = edges.filter(e => e.source === previewSceneId);
          const previewActor = cast.find(c => c.id === currentPreviewNode?.data?.speakerId) || cast[0];

          const activeNode = nodes.find(n => n.id === selectedNode?.id);
          const activeEdge = edges.find(e => e.id === selectedEdge?.id);

          const minX = nodes.length > 0 ? Math.min(...nodes.map(n => n.position.x)) : 0;
          const minY = nodes.length > 0 ? Math.min(...nodes.map(n => n.position.y)) : 0;
          const graphWidth = nodes.length > 0 ? Math.max(...nodes.map(n => n.position.x)) - minX + 600 : 800;
          const graphHeight = nodes.length > 0 ? Math.max(...nodes.map(n => n.position.y)) - minY + 500 : 600;

          return (
            <div className="flex h-screen w-screen bg-[#1e1e1e] font-sans text-gray-200 overflow-hidden">
              
              {pdfMode && (
                <div id="pdf-capture-area" className="absolute top-0 left-0 bg-white p-12 z-[100] flex flex-col gap-12 font-sans" style={{ minWidth: '100vw', minHeight: '100vh', width: 'max-content', height: 'max-content' }}>
                  <div className="flex flex-col gap-4 border-b-4 border-gray-200 pb-8">
                     <h1 className="text-6xl font-black text-gray-800 tracking-tight">{packName}</h1>
                     <h2 className="text-2xl font-bold text-gray-400 uppercase tracking-widest">Dialogue Blueprint & Roster</h2>
                     
                     <div className="flex flex-wrap gap-8 mt-6">
                        {cast.map(actor => (
                           <div key={`pdf_actor_${actor.id}`} className="flex items-center gap-6 bg-gray-50 p-4 rounded-xl border-2 border-gray-200 shadow-sm pr-12">
                              <div className="w-[120px] h-[160px] bg-gray-200 rounded-lg overflow-hidden border-2 border-gray-300 flex items-center justify-center">
                                 <SkinViewer skinUrl={actor.skinUrl} animation="idle" camX={-15} camY={12} camZ={40} zoom={0.6} width={120} height={160} hideBadge={true} />
                              </div>
                              <div className="flex flex-col gap-5">
                                 <span className="text-3xl font-bold text-gray-800 pb-1">{actor.name}</span>
                                 <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full border-[3px] border-gray-300 shadow-inner" style={{backgroundColor: actor.eggBase}}></div>
                                    <div className="w-8 h-8 rounded-full border-[3px] border-gray-300 shadow-inner" style={{backgroundColor: actor.eggOverlay}}></div>
                                 </div>
                              </div>
                           </div>
                        ))}
                     </div>
                  </div>

                  <div className="relative mt-8" style={{ width: graphWidth, height: graphHeight }}>
                      <svg className="absolute inset-0 pointer-events-none" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
                         {edges.map(edge => {
                             const sourceNode = nodes.find(n => n.id === edge.source);
                             const targetNode = nodes.find(n => n.id === edge.target);
                             if (!sourceNode || !targetNode) return null;
                             
                             const sEl = document.getElementById(`node_${sourceNode.id}`);
                             const sHeight = sEl ? sEl.offsetHeight : 144;

                             const startX = sourceNode.position.x - minX + 128;
                             const startY = sourceNode.position.y - minY + sHeight;
                             const endX = targetNode.position.x - minX + 128;
                             const endY = targetNode.position.y - minY;
                             
                             return <path key={`pdf_edge_${edge.id}`} d={`M ${startX} ${startY} C ${startX} ${startY + 80}, ${endX} ${endY - 80}, ${endX} ${endY}`} stroke="#888" strokeWidth="4" fill="none" />;
                         })}
                      </svg>

                      <div className="absolute inset-0 pointer-events-none z-10" style={{ overflow: "visible" }}>
                          {edges.map(edge => {
                           const sourceNode = nodes.find(n => n.id === edge.source);
                           const targetNode = nodes.find(n => n.id === edge.target);
                           if (!sourceNode || !targetNode) return null;
                           
                           const sEl = document.getElementById(`node_${sourceNode.id}`);
                           const sHeight = sEl ? sEl.offsetHeight : 144;

                           const midX = ((sourceNode.position.x - minX + 128) + (targetNode.position.x - minX + 128)) / 2;
                           const midY = ((sourceNode.position.y - minY + sHeight) + (targetNode.position.y - minY)) / 2;
                           return (
                              <div key={`pdf_label_${edge.id}`} className="absolute bg-white text-gray-800 px-3 py-1.5 rounded-md text-sm font-bold shadow-md border-2 border-gray-300" style={{ left: midX, top: midY, transform: 'translate(-50%, -50%)' }}>
                                  {edge.data.label || 'Continue'}
                              </div>
                           )
                          })}
                      </div>

                      {nodes.map(node => {
                          const nodeActor = cast.find(c => c.id === node.data.speakerId) || cast[0];
                          return (
                          <div key={`pdf_node_${node.id}`} id={`node_${node.id}`} className="absolute w-64 p-0 rounded-xl border-4 shadow-xl bg-[#2c2c2c] border-[#4a4a4a]" style={{ left: node.position.x - minX, top: node.position.y - minY }}>
                              <div className="bg-[#1e1e1e] p-3 flex items-center justify-between border-b-4 border-[#151515] rounded-t-lg">
                                  <div className="flex items-center gap-2">
                                      <div className={`w-4 h-4 rounded-full border-2 border-black shadow-inner ${node.data.isStart ? 'bg-green-500' : 'bg-blue-500'}`} />
                                      <span className="text-gray-200 text-sm font-bold uppercase tracking-wider">{node.data.isStart ? 'Start Scene' : 'Scene'}</span>
                                  </div>
                                  <span className="text-xs text-gray-500 font-mono">{node.id.substring(6,10)}</span>
                              </div>
                              <div className="p-4 flex flex-col gap-3">
                                  <div className="bg-[#3c3c3c] px-3 py-2 text-white border-2 border-[#151515] rounded-md shadow-inner text-sm font-bold flex justify-between items-center">
                                      <span>{nodeActor.name}</span>
                                      <div className="w-3 h-3 rounded-full shadow-sm border border-black" style={{backgroundColor: nodeActor.eggBase}} />
                                  </div>
                                  <div className="bg-[#3c3c3c] px-3 pt-2 pb-3 text-gray-200 border-2 border-[#151515] rounded-md shadow-inner text-sm italic whitespace-pre-wrap flex-1">
                                      "{node.data.text}"
                                  </div>
                              </div>
                              {!node.data.isStart && <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-gray-400 border-[3px] border-[#151515] rounded-sm" />}
                              <div className="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-6 h-6 bg-yellow-500 border-[3px] border-[#151515] rounded-sm" />
                          </div>
                      )})}
                  </div>
                </div>
              )}

              <aside className="w-80 bg-[#252526] border-r border-[#333] flex flex-col shadow-2xl z-20">
                <div className="p-4 border-b border-[#333] bg-[#1e1e1e]">
                  <h1 className="text-lg font-black text-white flex items-center gap-2">
                    <BoxIcon size={24} className="text-yellow-500" /> CLEVERLIKE DIALOGUE FORGE
                  </h1>
                  <p className="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-widest">Bedrock Addon Creator</p>
                </div>

                <div className="p-4 flex-1 overflow-y-auto space-y-4">
                  <section className="space-y-2">
                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                      <Settings size={14} /> Pack Details
                    </h3>
                    <div className="space-y-1">
                      <label className="text-[10px] font-bold text-gray-400 uppercase">Addon Name</label>
                      <input 
                        className={`w-full bg-[#333] border ${nameError ? 'border-red-500' : 'border-[#444]'} rounded px-3 py-1.5 text-sm focus:border-yellow-500 focus:outline-none transition-colors`}
                        placeholder="e.g. MyQuestPack"
                        value={packName}
                        onChange={(e) => { setPackName(e.target.value); setNameError(false); }}
                      />
                      {nameError && <p className="text-red-500 text-[10px] font-bold mt-1">Please name your Addon!</p>}
                    </div>
                  </section>

                  <section className="space-y-3 pt-3 border-t border-[#333]">
                    <div className="flex items-center justify-between">
                      <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                        <UserIcon size={14} /> Cast Roster ({cast.length}/4)
                      </h3>
                    </div>

                    <div className="flex gap-2 overflow-x-auto pb-1 custom-scrollbar">
                      {cast.map((actor) => (
                        <button key={actor.id} onClick={() => setActiveActorId(actor.id)} className={`px-3 py-1.5 rounded-md text-xs font-bold whitespace-nowrap transition-all ${activeActorId === actor.id ? 'bg-blue-600 text-white shadow-lg' : 'bg-[#333] text-gray-400 hover:bg-[#444]'}`}>
                          {actor.name.substring(0,10)}
                        </button>
                      ))}
                      {cast.length < 4 && <button onClick={handleAddActor} className="px-2 py-1.5 rounded-md bg-[#333] text-gray-400 hover:bg-[#444] hover:text-white transition-colors" title="Add Character"><Plus size={14} /></button>}
                    </div>

                    <div className="bg-[#1e1e1e] border border-[#333] rounded-lg p-3 space-y-3 animate-in fade-in duration-200">
                      <div className="flex justify-between items-center">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">NPC Name</label>
                        {cast.length > 1 && (
                          <button onClick={() => {
                            const newCast = cast.filter(c => c.id !== activeActorId);
                            setCast(newCast); setActiveActorId(newCast[0].id);
                            setNodes(nds => nds.map(n => n.data.speakerId === activeActorId ? { ...n, data: { ...n.data, speakerId: newCast[0].id } } : n));
                          }} className="text-red-500 hover:text-red-400" title="Delete Actor"><Trash2 size={12} /></button>
                        )}
                      </div>
                      <input className="w-full bg-[#333] border border-[#444] rounded px-2 py-1.5 text-sm focus:border-blue-500 focus:outline-none" value={activeActor.name} onChange={(e) => updateActiveActor({name: e.target.value})} />

                      <div 
                        className={`flex flex-col gap-2 items-center pt-2 p-2 rounded-lg border-2 transition-colors ${isDraggingSkin ? 'border-blue-500 bg-blue-500/10 border-dashed' : 'border-transparent'}`}
                        onDragOver={(e) => { e.preventDefault(); setIsDraggingSkin(true); }}
                        onDragLeave={(e) => { 
                            e.preventDefault(); 
                            if (!e.currentTarget.contains(e.relatedTarget)) setIsDraggingSkin(false); 
                        }}
                        onDrop={handleSkinDrop}
                      >
                        <div className="w-[140px] h-[180px]">
                            <SkinViewer skinUrl={activeActor.skinUrl} camX={-20} width={140} height={180} zoom={0.8} />
                        </div>
                        <div className="relative w-full mt-1">
                          <input type="file" accept=".png" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" title="Drag & Drop or Click to upload" />
                          <div className="w-full bg-[#2a2a2a] border border-dashed border-[#555] rounded py-1.5 text-center text-[10px] uppercase font-bold text-gray-400 flex items-center justify-center gap-1.5 hover:bg-[#333] transition-colors">
                            <UploadIcon size={12} /> {isDraggingSkin ? "Drop Skin Here" : "Upload Skin (.png)"}
                          </div>
                        </div>
                      </div>

                      <div className="flex gap-3 w-full pt-1">
                        <div className="flex-1 space-y-1">
                          <label className="text-[9px] text-gray-400 font-bold uppercase tracking-wider block text-center">Egg Base</label>
                          <input type="color" value={activeActor.eggBase} onChange={(e) => updateActiveActor({eggBase: e.target.value})} className="w-full h-6 p-0 border border-[#444] rounded cursor-pointer" />
                        </div>
                        <div className="flex-1 space-y-1">
                          <label className="text-[9px] text-gray-400 font-bold uppercase tracking-wider block text-center">Egg Spots</label>
                          <input type="color" value={activeActor.eggOverlay} onChange={(e) => updateActiveActor({eggOverlay: e.target.value})} className="w-full h-6 p-0 border border-[#444] rounded cursor-pointer" />
                        </div>
                      </div>
                    </div>
                  </section>
                </div>

                <div className="p-3 border-t border-[#333] bg-[#252526] space-y-2">
                  <button onClick={exportPDF} disabled={isExporting} className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white py-1.5 rounded text-xs transition-all shadow-sm active:scale-95 disabled:opacity-50">
                    <FileText size={14} /> Download PDF Report
                  </button>
                  <button onClick={exportAddon} disabled={isExporting} className="w-full flex items-center justify-center gap-2 bg-green-600 hover:bg-green-500 text-white py-2 rounded font-bold text-sm transition-all shadow-lg active:scale-95 disabled:opacity-50">
                    <Download size={16} /> {isExporting ? 'Exporting...' : 'Export Addon'}
                  </button>
                </div>
              </aside>

              <main 
                ref={canvasContainerRef}
                className="flex-1 relative bg-[#1e1e1e] overflow-hidden select-none"
                style={{ cursor: isPanning ? 'grabbing' : 'grab' }}
                onMouseDown={handleCanvasMouseDown}
                onMouseMove={handleMouseMove}
                onMouseUp={handleMouseUp}
                onMouseLeave={handleMouseUp}
                onWheel={handleWheel}
              >
                <div style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: '0 0', width: '100%', height: '100%', position: 'absolute' }}>
                    <div className="absolute pointer-events-none" style={{ backgroundImage: 'radial-gradient(#333 1px, transparent 1px)', backgroundSize: '20px 20px', left: -5000, top: -5000, right: -5000, bottom: -5000 }} />
                    <svg className="absolute pointer-events-none z-0" style={{ overflow: 'visible' }}>
                      {edges.map(edge => {
                         const sourceNode = nodes.find(n => n.id === edge.source);
                         const targetNode = nodes.find(n => n.id === edge.target);
                         if (!sourceNode || !targetNode) return null;
                         
                         const sEl = document.getElementById(`node_${sourceNode.id}`);
                         const sHeight = sEl ? sEl.offsetHeight : 144;

                         const startX = sourceNode.position.x + 128;
                         const startY = sourceNode.position.y + sHeight;
                         const endX = targetNode.position.x + 128;
                         const endY = targetNode.position.y;
                         const isSelected = selectedEdge?.id === edge.id;
                         
                         return (
                           <React.Fragment key={edge.id}>
                             <path d={`M ${startX} ${startY} C ${startX} ${startY + 80}, ${endX} ${endY - 80}, ${endX} ${endY}`} stroke={isSelected ? '#eab308' : '#666'} strokeWidth={isSelected ? 4 : 2} fill="none" className="pointer-events-auto cursor-pointer transition-all" onClick={(e) => { e.stopPropagation(); setSelectedEdge(edge); setSelectedNode(null); }} />
                           </React.Fragment>
                         );
                      })}
                      
                      {connectingFrom && (() => {
                         const cNode = nodes.find(n => n.id === connectingFrom);
                         if (!cNode) return null;
                         const cEl = document.getElementById(`node_${connectingFrom}`);
                         const cHeight = cEl ? cEl.offsetHeight : 144;
                         const startX = cNode.position.x + 128;
                         const startY = cNode.position.y + cHeight;
                         return (
                            <path d={`M ${startX} ${startY} C ${startX} ${startY + 80}, ${mousePos.x}, ${mousePos.y - 50}, ${mousePos.x} ${mousePos.y}`} stroke="#eab308" strokeWidth={3} strokeDasharray="5,5" fill="none" />
                         );
                      })()}
                    </svg>

                    <div className="absolute inset-0 pointer-events-none z-10" style={{ overflow: "visible" }}>
                        {edges.map(edge => {
                         const sourceNode = nodes.find(n => n.id === edge.source);
                         const targetNode = nodes.find(n => n.id === edge.target);
                         if (!sourceNode || !targetNode) return null;
                         
                         const sEl = document.getElementById(`node_${sourceNode.id}`);
                         const sHeight = sEl ? sEl.offsetHeight : 144;

                         const startX = sourceNode.position.x + 128;
                         const startY = sourceNode.position.y + sHeight;
                         const endX = targetNode.position.x + 128;
                         const endY = targetNode.position.y;
                         const midX = (startX + endX) / 2;
                         const midY = (startY + endY) / 2;
                         
                         return (
                            <div key={`label_${edge.id}`} className={`absolute bg-[#222] text-white px-2 py-1 rounded text-[10px] font-bold shadow-lg border cursor-pointer pointer-events-auto transition-colors hover:border-yellow-400 ${selectedEdge?.id === edge.id ? 'border-yellow-500' : 'border-[#555]'}`} style={{ left: midX, top: midY, transform: 'translate(-50%, -50%)' }} onClick={(e) => { e.stopPropagation(); setSelectedEdge(edge); setSelectedNode(null); }}>
                                {edge.data.label || 'Continue'}
                            </div>
                         )
                        })}
                    </div>

                    {nodes.map(node => {
                        const nodeActor = cast.find(c => c.id === node.data.speakerId) || cast[0];
                        return (
                        <div key={node.id} id={`node_${node.id}`} className={`absolute w-64 p-0 rounded-md border-2 shadow-2xl transition-transform cursor-move bg-[#2c2c2c] ${selectedNode?.id === node.id ? 'border-blue-400 z-30' : 'border-[#4a4a4a] z-20'} ${draggingNode === node.id ? 'opacity-90' : 'opacity-100'}`} style={{ left: node.position.x, top: node.position.y }} onMouseDown={(e) => handleNodeMouseDown(e, node)} onClick={(e) => e.stopPropagation()}>
                            <div className="bg-[#1e1e1e] p-2 flex items-center justify-between border-b-2 border-[#151515]">
                                <div className="flex items-center gap-2">
                                    <div className={`w-3 h-3 rounded-full border border-black shadow-inner ${node.data.isStart ? 'bg-green-500' : 'bg-blue-500'}`} />
                                    <span className="text-gray-300 text-xs font-bold uppercase tracking-wider">{node.data.isStart ? 'Start Scene' : 'Scene'}</span>
                                </div>
                                <span className="text-[10px] text-gray-500 font-mono">{node.id.substring(6,10)}</span>
                            </div>
                            <div className="p-3 flex flex-col gap-2 pointer-events-none">
                                <div className="flex flex-col">
                                    <div className="bg-[#3c3c3c] px-2 py-1 text-white border border-[#151515] rounded shadow-inner text-xs font-semibold truncate flex justify-between items-center">
                                        <span>{nodeActor.name}</span>
                                        <div className="w-2 h-2 rounded-full shadow-sm" style={{backgroundColor: nodeActor.eggBase}} />
                                    </div>
                                </div>
                                <div className="flex flex-col">
                                    <div className="bg-[#3c3c3c] px-2 pt-1 pb-1.5 text-gray-200 border border-[#151515] rounded shadow-inner text-xs italic whitespace-pre-wrap">
                                        "{node.data.text}"
                                    </div>
                                </div>
                            </div>
                            {!node.data.isStart && <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-gray-400 border-2 border-[#151515] rounded-sm cursor-crosshair hover:bg-gray-200 transition-colors z-40 pointer-events-auto" onMouseUp={(e) => handleTargetMouseUp(e, node.id)} />}
                            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-4 h-4 bg-yellow-500 border-2 border-[#151515] rounded-sm cursor-crosshair hover:bg-yellow-400 transition-colors z-40 pointer-events-auto" onMouseDown={(e) => handleSourceMouseDown(e, node.id)} />
                        </div>
                    )})}
                </div>

                <div className="absolute top-4 left-4 flex gap-2 z-40" onMouseDown={e => e.stopPropagation()}>
                  <button onClick={addDialogueNode} className="bg-[#333] hover:bg-[#444] border border-[#555] text-white px-4 py-2 rounded-md font-bold flex items-center gap-2 shadow-lg transition-all text-sm active:scale-95"><Plus size={16} /> Add Scene</button>
                  <button onClick={autoLayout} className="bg-blue-600 hover:bg-blue-500 border border-blue-400 text-white px-4 py-2 rounded-md font-bold flex items-center gap-2 shadow-lg transition-all text-sm active:scale-95" title="Automatically organize nodes top-to-bottom"><Network size={16} /> Clean Layout</button>
                </div>

                <div className="absolute top-4 right-4 flex gap-2 z-40" onMouseDown={e => e.stopPropagation()}>
                  <button onClick={() => { setPreviewSceneId(nodes[0]?.id || 'start_scene'); setShowPreview(true); }} disabled={nodes.length === 0} className="bg-yellow-500 hover:bg-yellow-400 disabled:opacity-50 text-black px-5 py-2 rounded-md font-bold flex items-center gap-2 shadow-lg transition-all active:scale-95 text-sm"><Play size={16} fill="currentColor" /> Playtest</button>
                </div>

                <div className="absolute bottom-4 right-4 flex gap-1 z-40 bg-[#252526] p-1.5 rounded-lg border border-[#333] shadow-xl" onMouseDown={e => e.stopPropagation()}>
                  <button onClick={() => setZoom(z => Math.max(0.2, z - 0.2))} className="p-1.5 text-gray-400 hover:text-white hover:bg-[#333] rounded transition-colors" title="Zoom Out"><ZoomOut size={18} /></button>
                  <div className="flex items-center justify-center w-12 text-xs font-mono text-gray-300 font-bold">{Math.round(zoom * 100)}%</div>
                  <button onClick={() => setZoom(z => Math.min(2, z + 0.2))} className="p-1.5 text-gray-400 hover:text-white hover:bg-[#333] rounded transition-colors" title="Zoom In"><ZoomIn size={18} /></button>
                  <div className="w-px h-6 bg-[#444] mx-1"></div>
                  <button onClick={() => { setZoom(1); setPan({x:0, y:0}); }} className="p-1.5 text-gray-400 hover:text-white hover:bg-[#333] rounded transition-colors" title="Reset View"><BoxIcon size={18} /></button>
                  <button onClick={() => fitView()} className="p-1.5 text-blue-400 hover:text-blue-300 hover:bg-[#333] rounded transition-colors" title="Frame All Nodes"><Maximize size={18} /></button>
                </div>
              </main>

              <aside className="w-80 bg-[#252526] border-l border-[#333] flex flex-col shadow-2xl z-20">
                <div className="p-4 border-b border-[#333] bg-[#1e1e1e]">
                  <h2 className="text-sm font-bold text-gray-300 uppercase tracking-wider flex items-center gap-2"><Settings size={16} /> Inspector</h2>
                </div>
                <div className="p-4 flex-1 overflow-y-auto">
                  {activeNode ? (
                    <div className="space-y-4 animate-in fade-in duration-200">
                      <div className="flex items-center gap-2 text-blue-400 mb-3 pb-2 border-b border-[#444]"><MessageSquare size={16} /> <span className="font-bold text-sm">Scene Edit</span></div>
                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">Speaker Assignment</label>
                        <select className="w-full bg-[#333] border border-[#444] rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none transition-colors text-white" value={activeNode.data.speakerId || cast[0].id} onChange={(e) => updateNodeData(activeNode.id, { speakerId: e.target.value })}>
                          {cast.map(actor => <option key={`opt_${actor.id}`} value={actor.id}>{actor.name}</option>)}
                        </select>
                      </div>
                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">Dialogue Text</label>
                        <textarea 
                          className="w-full bg-[#333] border border-[#444] rounded px-3 py-2 text-sm h-28 resize-none focus:border-blue-500 outline-none transition-colors" 
                          value={activeNode.data.text || ''} 
                          onFocus={() => {
                            if (activeNode.data.text === 'Click here to edit this starting dialogue.' || activeNode.data.text === 'Click to edit this new dialogue.') {
                              updateNodeData(activeNode.id, { text: '' });
                            }
                          }}
                          onChange={(e) => updateNodeData(activeNode.id, { text: e.target.value })} 
                          placeholder="Type dialogue here..."
                        />
                      </div>
                      <div className="space-y-3 mt-3 pt-3 border-t border-[#444]">
                        <label className="flex items-center gap-2 text-[10px] font-bold text-gray-400 uppercase cursor-pointer">
                          <input type="checkbox" className="w-3 h-3 accent-blue-500" checked={activeNode.data.hasCloseButton ?? false} onChange={(e) => updateNodeData(activeNode.id, { hasCloseButton: e.target.checked })} /> Add "Close Dialogue" Button
                        </label>
                        {(activeNode.data.hasCloseButton ?? false) && (
                          <div className="space-y-3">
                            <div className="space-y-1">
                              <label className="text-[10px] font-bold text-gray-400 uppercase">Close Button Label</label>
                              <input className="w-full bg-[#333] border border-[#444] rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none transition-colors" placeholder="e.g. Goodbye!" value={activeNode.data.closeButtonLabel || 'Goodbye'} onChange={(e) => updateNodeData(activeNode.id, { closeButtonLabel: e.target.value })} />
                            </div>
                            <label className="flex items-center gap-2 text-[10px] font-bold text-red-400 uppercase cursor-pointer">
                              <input type="checkbox" className="w-3 h-3 accent-red-500" checked={activeNode.data.despawnCast ?? false} onChange={(e) => updateNodeData(activeNode.id, { despawnCast: e.target.checked })} /> Despawn Whole Cast
                            </label>
                          </div>
                        )}
                      </div>
                      {!activeNode.data.isStart && (
                        <button onClick={() => { setNodes(nds => nds.filter(n => n.id !== activeNode.id)); setEdges(eds => eds.filter(e => e.source !== activeNode.id && e.target !== activeNode.id)); setSelectedNode(null); }} className="w-full flex items-center justify-center gap-2 mt-3 p-2 bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20 rounded text-xs font-bold transition-all"><Trash2 size={14} /> Delete Scene</button>
                      )}
                    </div>
                  ) : activeEdge ? (
                    <div className="space-y-4 animate-in fade-in duration-200">
                      <div className="flex items-center gap-2 text-yellow-500 mb-3 pb-2 border-b border-[#444]"><MessageSquare size={16} /> <span className="font-bold text-sm">Button Edit</span></div>
                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">Button Label</label>
                        <input className="w-full bg-[#333] border border-[#444] rounded px-3 py-1.5 text-sm focus:border-yellow-500 outline-none transition-colors" placeholder="e.g. Continue..." value={activeEdge.data.label || ''} onChange={(e) => updateEdgeData(activeEdge.id, { label: e.target.value })} />
                      </div>
                      
                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">Give Item</label>
                        <select className="w-full bg-[#333] border border-[#444] rounded px-3 py-1.5 text-sm focus:border-yellow-500 outline-none transition-colors text-white" value={activeEdge.data.giveItem || ''} onChange={(e) => updateEdgeData(activeEdge.id, { giveItem: e.target.value })}>
                          {MINECRAFT_ITEMS.map(item => <option key={item.id} value={item.id}>{item.name}</option>)}
                        </select>
                      </div>
                      
                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">Play Sound</label>
                        <select className="w-full bg-[#333] border border-[#444] rounded px-3 py-1.5 text-sm focus:border-yellow-500 outline-none transition-colors text-white" value={activeEdge.data.soundId || ''} onChange={(e) => updateEdgeData(activeEdge.id, { soundId: e.target.value })}>
                          {MINECRAFT_SOUNDS.map(sound => <option key={sound.id} value={sound.id}>{sound.name}</option>)}
                        </select>
                      </div>

                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">Additional Commands</label>
                        <textarea className="w-full bg-[#333] border border-[#444] rounded px-3 py-2 text-sm h-20 resize-none focus:border-yellow-500 outline-none transition-colors font-mono text-xs" placeholder="/time set day" value={activeEdge.data.commands || ''} onChange={(e) => updateEdgeData(activeEdge.id, { commands: e.target.value })} />
                      </div>
                      
                      <div className="space-y-3 mt-3 pt-3 border-t border-[#444]">
                        <label className="flex items-center gap-2 text-[10px] font-bold text-red-400 uppercase cursor-pointer">
                          <input type="checkbox" className="w-3 h-3 accent-red-500" checked={activeEdge.data.despawnCast ?? false} onChange={(e) => updateEdgeData(activeEdge.id, { despawnCast: e.target.checked })} /> Ends Dialogue & Despawns Cast
                        </label>
                      </div>

                      <button onClick={() => { setEdges(eds => eds.filter(e => e.id !== activeEdge.id)); setSelectedEdge(null); }} className="w-full flex items-center justify-center gap-2 mt-3 p-2 bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20 rounded text-xs font-bold transition-all"><Trash2 size={14} /> Delete Connection</button>
                    </div>
                  ) : (
                    <div className="flex flex-col items-center justify-center h-full text-gray-500 space-y-4"><Settings size={32} className="opacity-20" /><p className="text-xs font-bold uppercase tracking-widest text-center">Select a node or<br/>connection to edit</p></div>
                  )}
                </div>
              </aside>

              {showPreview && currentPreviewNode && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                  <div className="relative w-full max-w-4xl bg-[#c6c6c6] border-2 border-[#1e1e1e] shadow-[inset_2px_2px_0px_#ffffff,inset_-2px_-2px_0px_#555555] p-2 flex flex-col font-minecraft select-none">
                    <div className="relative flex justify-center items-center py-2 mb-2">
                      <h3 className="text-[#3c3c3c] text-[22px] tracking-wide">{previewActor.name}</h3>
                      <button onClick={() => setShowPreview(false)} className="absolute right-2 top-0 p-1 text-[#555] hover:text-[#1e1e1e] transition-colors"><XIcon size={28} strokeWidth={2.5} /></button>
                    </div>
                    <div className="flex flex-row gap-6 px-4 pb-2">
                      <div className="w-[200px] h-[280px] bg-[#484848] border-[3px] border-[#1e1e1e] shadow-[inset_3px_3px_0px_#222,inset_-3px_-3px_0px_#666] relative flex items-center justify-center flex-shrink-0 overflow-hidden">
                        <div className="absolute inset-0 flex items-center justify-center -translate-y-4">
                          <div className="w-[250px] h-[350px] scale-90"><SkinViewer skinUrl={previewActor.skinUrl} animation="idle" camX={-12} camY={12} camZ={35} /></div>
                        </div>
                      </div>
                      <div className="flex-1 relative bg-[#ececec] border-2 border-[#1e1e1e] rounded-sm p-6 shadow-[2px_2px_0px_rgba(0,0,0,0.15)] flex flex-col">
                        <div className="absolute top-[40px] -left-[24px] w-0 h-0 border-y-[16px] border-y-transparent border-r-[24px] border-r-[#1e1e1e]">
                          <div className="absolute -top-[12px] left-[3px] w-0 h-0 border-y-[12px] border-y-transparent border-r-[18px] border-r-[#ececec]"></div>
                        </div>
                        <div className="overflow-y-auto custom-scrollbar flex-1 pr-2">
                          <p className="text-[#1e1e1e] text-[22px] leading-snug whitespace-pre-wrap">{currentPreviewNode.data.text}</p>
                        </div>
                      </div>
                    </div>
                    <div className="flex flex-row flex-wrap justify-center gap-2 mt-4 px-4 pb-2 w-full">
                      {previewOptions.map((edge, idx) => (
                        <button key={idx} onClick={() => setPreviewSceneId(edge.target)} className="flex-1 bg-[#c6c6c6] border-2 border-[#1e1e1e] shadow-[inset_2px_2px_0px_#ffffff,inset_-2px_-2px_0px_#555555] active:shadow-[inset_2px_2px_0px_#555555,inset_-2px_-2px_0px_#ffffff] py-2.5 px-6 min-w-[150px] max-w-[400px] text-center text-[#1e1e1e] text-xl transition-all focus:outline-none">{edge.data.label || "Continue"}</button>
                      ))}
                      {(currentPreviewNode.data.hasCloseButton || previewOptions.length === 0) && (
                        <button onClick={() => setShowPreview(false)} className="flex-1 bg-[#c6c6c6] border-2 border-[#1e1e1e] shadow-[inset_2px_2px_0px_#ffffff,inset_-2px_-2px_0px_#555555] active:shadow-[inset_2px_2px_0px_#555555,inset_-2px_-2px_0px_#ffffff] py-2.5 px-6 min-w-[150px] max-w-[400px] text-center text-[#1e1e1e] text-xl transition-all focus:outline-none">{currentPreviewNode.data.closeButtonLabel || "Goodbye"}</button>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
