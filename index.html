                        onChange={(e) => { setPackName(e.target.value); setNameError(false); }}
                      />
                      {nameError && <p className="text-red-500 text-[10px] font-bold mt-1">Please name your Addon!</p>}
                    </div>
                  </section>

                  <section className="space-y-3 pt-3 border-t border-[#333]">
                    <div className="flex items-center justify-between">
                      <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                        <UserIcon size={14} /> Cast Roster ({cast.length}/4)
                      </h3>
                    </div>

                    <div className="flex gap-2 overflow-x-auto pb-1 custom-scrollbar">
                      {cast.map((actor) => (
                        <button key={actor.id} onClick={() => setActiveActorId(actor.id)} className={`px-3 py-1.5 rounded-md text-xs font-bold whitespace-nowrap transition-all ${activeActorId === actor.id ? 'bg-blue-600 text-white shadow-lg' : 'bg-[#333] text-gray-400 hover:bg-[#444]'}`}>
                          {actor.name.substring(0,10)}
                        </button>
                      ))}
                      {cast.length < 4 && <button onClick={handleAddActor} className="px-2 py-1.5 rounded-md bg-[#333] text-gray-400 hover:bg-[#444] hover:text-white transition-colors" title="Add Character"><Plus size={14} /></button>}
                    </div>

                    <div className="bg-[#1e1e1e] border border-[#333] rounded-lg p-3 space-y-3 animate-in fade-in duration-200">
                      <div className="flex justify-between items-center">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">NPC Name</label>
                        {cast.length > 1 && (
                          <button onClick={() => {
                            const newCast = cast.filter(c => c.id !== activeActorId);
                            setCast(newCast); setActiveActorId(newCast[0].id);
                            setNodes(nds => nds.map(n => n.data.speakerId === activeActorId ? { ...n, data: { ...n.data, speakerId: newCast[0].id } } : n));
                          }} className="text-red-500 hover:text-red-400" title="Delete Actor"><Trash2 size={12} /></button>
                        )}
                      </div>
                      <input className="w-full bg-[#333] border border-[#444] rounded px-2 py-1.5 text-sm focus:border-blue-500 focus:outline-none" value={activeActor.name} onChange={(e) => updateActiveActor({name: e.target.value})} />

                      <div 
                        className={`flex flex-col gap-2 items-center pt-2 p-2 rounded-lg border-2 transition-colors ${isDraggingSkin ? 'border-blue-500 bg-blue-500/10 border-dashed' : 'border-transparent'}`}
                        onDragOver={(e) => { e.preventDefault(); setIsDraggingSkin(true); }}
                        onDragLeave={(e) => { 
                            e.preventDefault(); 
                            if (!e.currentTarget.contains(e.relatedTarget)) setIsDraggingSkin(false); 
                        }}
                        onDrop={handleSkinDrop}
                      >
                        <div className="w-[140px] h-[180px]">
                            <SkinViewer skinUrl={activeActor.skinUrl} camX={-20} width={140} height={180} zoom={0.8} />
                        </div>
                        <div className="relative w-full mt-1">
                          <input type="file" accept=".png" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" title="Drag & Drop or Click to upload" />
                          <div className="w-full bg-[#2a2a2a] border border-dashed border-[#555] rounded py-1.5 text-center text-[10px] uppercase font-bold text-gray-400 flex items-center justify-center gap-1.5 hover:bg-[#333] transition-colors">
                            <UploadIcon size={12} /> {isDraggingSkin ? "Drop Skin Here" : "Upload Skin (.png)"}
                          </div>
                        </div>
                      </div>

                      <div className="flex gap-3 w-full pt-1">
                        <div className="flex-1 space-y-1">
                          <label className="text-[9px] text-gray-400 font-bold uppercase tracking-wider block text-center">Egg Base</label>
                          <input type="color" value={activeActor.eggBase} onChange={(e) => updateActiveActor({eggBase: e.target.value})} className="w-full h-6 p-0 border border-[#444] rounded cursor-pointer" />
                        </div>
                        <div className="flex-1 space-y-1">
                          <label className="text-[9px] text-gray-400 font-bold uppercase tracking-wider block text-center">Egg Spots</label>
                          <input type="color" value={activeActor.eggOverlay} onChange={(e) => updateActiveActor({eggOverlay: e.target.value})} className="w-full h-6 p-0 border border-[#444] rounded cursor-pointer" />
                        </div>
                      </div>
                    </div>
                  </section>
                </div>

                <div className="p-3 border-t border-[#333] bg-[#252526] space-y-2">
                  <div className="flex gap-2">
                      <button onClick={saveProject} className="flex-1 flex items-center justify-center gap-1.5 bg-[#333] hover:bg-[#444] text-gray-200 py-1.5 rounded text-[11px] font-bold transition-all shadow-sm active:scale-95 border border-[#555]">
                        <Save size={14} /> Save Project
                      </button>
                      <button onClick={() => fileInputRef.current?.click()} className="flex-1 flex items-center justify-center gap-1.5 bg-[#333] hover:bg-[#444] text-gray-200 py-1.5 rounded text-[11px] font-bold transition-all shadow-sm active:scale-95 border border-[#555]">
                        <Folder size={14} /> Load Project
                      </button>
                      <input type="file" accept=".mdf,.json" className="hidden" ref={fileInputRef} onChange={loadProject} />
                  </div>
                  {loadError && <div className="text-red-500 text-[10px] font-bold text-center">{loadError}</div>}
                  <button onClick={exportPDF} disabled={isExporting} className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white py-1.5 rounded text-xs transition-all shadow-sm active:scale-95 disabled:opacity-50">
                    <FileText size={14} /> Download PDF Report
                  </button>
                  <button onClick={exportAddon} disabled={isExporting} className="w-full flex items-center justify-center gap-2 bg-green-600 hover:bg-green-500 text-white py-2 rounded font-bold text-sm transition-all shadow-lg active:scale-95 disabled:opacity-50">
                    <Download size={16} /> {isExporting ? 'Exporting...' : 'Export Addon'}
                  </button>
                </div>
              </aside>

              <main 
                ref={canvasContainerRef}
                className="flex-1 relative bg-[#1e1e1e] overflow-hidden select-none"
                style={{ cursor: isPanning && viewMode === 'nodes' ? 'grabbing' : (viewMode === 'nodes' ? 'grab' : 'default') }}
                onMouseDown={(e) => { if(viewMode === 'nodes') handleCanvasMouseDown(e) }}
                onMouseMove={(e) => { if(viewMode === 'nodes') handleMouseMove(e) }}
                onMouseUp={(e) => { if(viewMode === 'nodes') handleMouseUp(e) }}
                onMouseLeave={(e) => { if(viewMode === 'nodes') handleMouseUp(e) }}
                onWheel={(e) => { if(viewMode === 'nodes') handleWheel(e) }}
              >
                {viewMode === 'nodes' ? (
                  <>
                    <div style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: '0 0', width: '100%', height: '100%', position: 'absolute' }}>
                        <div className="absolute pointer-events-none" style={{ backgroundImage: 'radial-gradient(#333 1px, transparent 1px)', backgroundSize: '20px 20px', left: -5000, top: -5000, right: -5000, bottom: -5000 }} />
                        <svg className="absolute pointer-events-none z-0" style={{ overflow: 'visible' }}>
                          {edges.map(edge => {
                             const sourceNode = nodes.find(n => n.id === edge.source);
                             const targetNode = nodes.find(n => n.id === edge.target);
                             if (!sourceNode || !targetNode) return null;
                             
                             const sEl = document.getElementById(`node_${sourceNode.id}`);
                             const sHeight = sEl ? sEl.offsetHeight : 144;

                             const startX = sourceNode.position.x + 128;
                             const startY = sourceNode.position.y + sHeight;
                             const endX = targetNode.position.x + 128;
                             const endY = targetNode.position.y;
                             const isSelected = selectedEdgeIds.includes(edge.id);
                             
                             const isChainLink = sourceNode.data.isChangeScene || sourceNode.data.isActionbar;
                             const linkColor = sourceNode.data.isActionbar ? "#06b6d4" : "#8b5cf6";
                             const { pathD } = calculateEdgePath(startX, startY, endX, endY, edge.id);
                             
                             return (
                               <React.Fragment key={edge.id}>
                                 <path d={pathD} stroke={isSelected ? '#eab308' : (isChainLink ? linkColor : '#666')} strokeWidth={isSelected ? 4 : (isChainLink ? 3 : 2)} strokeDasharray="none" fill="none" className="pointer-events-auto cursor-pointer transition-all" onClick={(e) => { e.stopPropagation(); setSelectedEdgeIds([edge.id]); setSelectedNodeIds([]); }} />
                               </React.Fragment>
                             );
                          })}
                          
                          {connectingFrom && (() => {
                             const cNode = nodes.find(n => n.id === connectingFrom);
                             if (!cNode) return null;
                             const cEl = document.getElementById(`node_${connectingFrom}`);
                             const cHeight = cEl ? cEl.offsetHeight : 144;
                             const startX = cNode.position.x + 128;
                             const startY = cNode.position.y + cHeight;
                             
                             const isChainLink = cNode.data.isChangeScene || cNode.data.isActionbar;
                             const linkColor = cNode.data.isActionbar ? "#06b6d4" : "#8b5cf6";
                             
                             return (
                                <path d={`M ${startX} ${startY} C ${startX} ${startY + 80}, ${mousePos.x}, ${mousePos.y - 50}, ${mousePos.x} ${mousePos.y}`} stroke={isChainLink ? linkColor : "#eab308"} strokeWidth={3} strokeDasharray={isChainLink ? "6,6" : "5,5"} fill="none" />
                             );
                          })()}
                        </svg>

                        <div className="absolute inset-0 pointer-events-none z-10" style={{ overflow: "visible" }}>
                            {edges.map(edge => {
                             const sourceNode = nodes.find(n => n.id === edge.source);
                             const targetNode = nodes.find(n => n.id === edge.target);
                             if (!sourceNode || !targetNode || sourceNode.data.isChangeScene || sourceNode.data.isActionbar) return null;
                             
                             const sEl = document.getElementById(`node_${sourceNode.id}`);
                             const sHeight = sEl ? sEl.offsetHeight : 144;

                             const startX = sourceNode.position.x + 128;
                             const startY = sourceNode.position.y + sHeight;
                             const endX = targetNode.position.x + 128;
                             const endY = targetNode.position.y;
                             
                             const { midX, midY } = calculateEdgePath(startX, startY, endX, endY, edge.id);
                             
                             return (
                                <div key={`label_${edge.id}`} className={`absolute bg-[#222] text-white px-2 py-1 rounded text-[10px] font-bold shadow-lg border cursor-pointer pointer-events-auto transition-colors hover:border-yellow-400 ${selectedEdgeIds.includes(edge.id) ? 'border-yellow-500' : 'border-[#555]'}`} style={{ left: midX, top: midY, transform: 'translate(-50%, -50%)' }} onClick={(e) => { e.stopPropagation(); setSelectedEdgeIds([edge.id]); setSelectedNodeIds([]); }}>
                                    {edge.data.label || 'Continue'}
                                </div>
                             )
                            })}
                        </div>

                        {selectionBox && (
                            <div 
                                className="absolute bg-blue-500/20 border border-blue-500 z-50 pointer-events-none"
                                style={{
                                    left: Math.min(selectionBox.startX, selectionBox.currentX),
                                    top: Math.min(selectionBox.startY, selectionBox.currentY),
                                    width: Math.abs(selectionBox.currentX - selectionBox.startX),
                                    height: Math.abs(selectionBox.currentY - selectionBox.startY)
                                }}
                            />
                        )}

                        {nodes.map(node => {
                            if (node.data.isChangeScene) {
                                return (
                                    <div key={node.id} id={`node_${node.id}`} className={`absolute w-64 p-0 rounded-md border-2 shadow-2xl transition-transform cursor-move bg-[#2d1b4e] ${selectedNodeIds.includes(node.id) ? 'border-purple-400 ring-2 ring-white z-30 scale-[1.02]' : 'border-[#4c1d95] z-20'} ${dragStartMouse && selectedNodeIds.includes(node.id) ? 'opacity-80' : 'opacity-100'}`} style={{ left: node.position.x, top: node.position.y }} onMouseDown={(e) => handleNodeMouseDown(e, node)} onClick={(e) => e.stopPropagation()}>
                                        <div className="bg-[#1e1e1e] p-2 flex items-center justify-between border-b-2 border-[#151515]">
                                            <div className="flex items-center gap-2">
                                                <div className="w-3 h-3 rounded-full border border-black shadow-inner bg-purple-500" />
                                                <span className="text-gray-300 text-xs font-bold uppercase tracking-wider">Change Scene</span>
                                            </div>
                                            <span className="text-[10px] text-gray-500 font-mono">{node.id.substring(5,9)}</span>
                                        </div>
                                        <div className="p-3 flex flex-col gap-2 pointer-events-none">
                                            <div className="text-[10px] text-gray-400 uppercase font-bold tracking-wider mb-1">Jumps to:</div>

                            {(() => {
                                const maxEdgesReached = outgoingEdgesCount >= 6 && !(activeNode.data.hasCloseButton ?? false);
                                return (
                                    <>
                                        <label className={`flex items-center gap-2 text-[10px] font-bold ${maxEdgesReached ? 'text-gray-600 cursor-not-allowed' : 'text-gray-400 cursor-pointer'} uppercase`}>
                                          <input type="checkbox" className="w-3 h-3 accent-blue-500 disabled:opacity-50" checked={activeNode.data.hasCloseButton ?? false} disabled={maxEdgesReached} onChange={(e) => updateNodeData(activeNode.id, { hasCloseButton: e.target.checked })} /> Add "Close Dialogue" Button
                                        </label>
                                        {maxEdgesReached && <p className="text-[9px] text-red-400 leading-tight">Maximum 6 branches reached. Remove a connection first.</p>}
                                    </>
                                )
                            })()}
                            {(activeNode.data.hasCloseButton ?? false) && (
                              <div className="space-y-3">
                                <div className="space-y-1">
                                  <label className="text-[10px] font-bold text-gray-400 uppercase">Close Button Label</label>
                                  <input className="w-full bg-[#333] border border-[#444] rounded px-3 py-1.5 text-sm focus:border-blue-500 outline-none transition-colors" placeholder="e.g. Close" maxLength={16} value={activeNode.data.closeButtonLabel ?? 'Close'} onChange={(e) => updateNodeData(activeNode.id, { closeButtonLabel: e.target.value })} />
                                </div>
                                <label className="flex items-center gap-2 text-[10px] font-bold text-red-400 uppercase cursor-pointer">
                                  <input type="checkbox" className="w-3 h-3 accent-red-500" checked={activeNode.data.despawnCast ?? false} onChange={(e) => updateNodeData(activeNode.id, { despawnCast: e.target.checked })} /> Despawn Whole Cast
                                </label>
                              </div>
                            )}
                          </div>
                          <button onClick={() => { setNodes(nds => nds.filter(n => n.id !== activeNode.id)); setEdges(eds => eds.filter(e => e.source !== activeNode.id && e.target !== activeNode.id)); setSelectedNodeIds([]); }} className="w-full flex items-center justify-center gap-2 mt-3 p-2 bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20 rounded text-xs font-bold transition-all"><Trash2 size={14} /> Delete {activeNode.data.isStart ? 'Start Scene' : 'Scene'}</button>
                        </div>
                    )
                  ) : activeEdge ? (
                    isEdgeFromLogicNode ? (
                        <div className="space-y-4 animate-in fade-in duration-200">
                          <div className="flex items-center gap-2 text-blue-400 mb-3 pb-2 border-b border-[#444]"><Network size={16} /> <span className="font-bold text-sm">Logic Chain Link</span></div>
                          <p className="text-xs text-gray-400 leading-tight">This edge instantly triggers the next logic node in the sequence. It happens entirely in the background and has no visual button.</p>
                          <button onClick={() => { setEdges(eds => eds.filter(e => e.id !== activeEdge.id)); setSelectedEdgeIds([]); }} className="w-full flex items-center justify-center gap-2 mt-3 p-2 bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20 rounded text-xs font-bold transition-all"><Trash2 size={14} /> Delete Connection</button>
                        </div>
                    ) : (
                        <div className="space-y-4 animate-in fade-in duration-200">
                          <div className="flex items-center gap-2 text-yellow-500 mb-3 pb-2 border-b border-[#444]"><MessageSquare size={16} /> <span className="font-bold text-sm">Button Edit</span></div>
                          <div className="space-y-1">
                            <label className="text-[10px] font-bold text-gray-400 uppercase">Button Label</label>
                            <input className="w-full bg-[#333] border border-[#444] rounded px-3 py-1.5 text-sm focus:border-yellow-500 outline-none transition-colors" placeholder="e.g. Continue..." maxLength={16} value={activeEdge.data.label || ''} onChange={(e) => updateEdgeData(activeEdge.id, { label: e.target.value })} />
                          </div>
                          
                          <div className="space-y-1">
                            <label className="text-[10px] font-bold text-gray-400 uppercase">Give Item</label>
                            <select className="w-full bg-[#333] border border-[#444] rounded px-3 py-1.5 text-sm focus:border-yellow-500 outline-none transition-colors text-white" value={activeEdge.data.giveItem || ''} onChange={(e) => updateEdgeData(activeEdge.id, { giveItem: e.target.value })}>
                              {MINECRAFT_ITEMS.map(item => <option key={item.id} value={item.id}>{item.name}</option>)}
                            </select>
                          </div>
                          
                          <div className="space-y-1">
                            <label className="text-[10px] font-bold text-gray-400 uppercase">Play Sound</label>
                            <select className="w-full bg-[#333] border border-[#444] rounded px-3 py-1.5 text-sm focus:border-yellow-500 outline-none transition-colors text-white" value={activeEdge.data.soundId || ''} onChange={(e) => updateEdgeData(activeEdge.id, { soundId: e.target.value })}>
                              {MINECRAFT_SOUNDS.map(sound => <option key={sound.id} value={sound.id}>{sound.name}</option>)}
                            </select>
                          </div>

                          <div className="space-y-1">
                            <label className="text-[10px] font-bold text-gray-400 uppercase">Additional Commands</label>
                            <textarea className="w-full bg-[#333] border border-[#444] rounded px-3 py-2 text-sm h-20 resize-none focus:border-yellow-500 outline-none transition-colors font-mono text-xs" placeholder="/time set day" value={activeEdge.data.commands || ''} onChange={(e) => updateEdgeData(activeEdge.id, { commands: e.target.value })} />
                          </div>
                          
                          <div className="space-y-3 mt-3 pt-3 border-t border-[#444]">
                            <label className="flex items-center gap-2 text-[10px] font-bold text-red-400 uppercase cursor-pointer">
                              <input type="checkbox" className="w-3 h-3 accent-red-500" checked={activeEdge.data.despawnCast ?? false} onChange={(e) => updateEdgeData(activeEdge.id, { despawnCast: e.target.checked })} /> Ends Dialogue & Despawns Cast
                            </label>
                          </div>

                          <button onClick={() => { setEdges(eds => eds.filter(e => e.id !== activeEdge.id)); setSelectedEdgeIds([]); }} className="w-full flex items-center justify-center gap-2 mt-3 p-2 bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20 rounded text-xs font-bold transition-all"><Trash2 size={14} /> Delete Connection</button>
                        </div>
                    )
                  ) : (
                    <div className="flex flex-col items-center justify-center h-full text-gray-500 space-y-4"><SearchIcon size={32} className="opacity-20" /><p className="text-xs font-bold uppercase tracking-widest text-center">Select a node or<br/>connection to edit</p></div>
                  )}
                </div>
              </aside>

              {showPreview && (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/80 font-minecraft select-none">
                  
                  {/* Screen Overlays */}
                  <div className="absolute inset-0 pointer-events-none flex flex-col items-center justify-center z-[100]">
                     {playtestOverlay.title && (
                       <div className="text-6xl font-bold font-minecraft drop-shadow-[3px_3px_0_#3f3f3f] mb-2 tracking-wide" style={{ color: getColorHex(playtestOverlay.titleColor) }}>{playtestOverlay.title}</div>
                     )}
                     {playtestOverlay.subtitle && (
                       <div className="text-3xl font-bold font-minecraft drop-shadow-[2px_2px_0_#3f3f3f] tracking-wide" style={{ color: getColorHex(playtestOverlay.subtitleColor) }}>{playtestOverlay.subtitle}</div>
                     )}
                     {playtestOverlay.actionbar && (
                       <div className="absolute bottom-24 text-2xl font-bold font-minecraft drop-shadow-[2px_2px_0_#3f3f3f] tracking-wide" style={{ color: getColorHex(playtestOverlay.actionbarColor) }}>{playtestOverlay.actionbar}</div>
                     )}
                  </div>

                  {/* Top-Right Close Button */}
                  <button onClick={() => { setPlaytestOverlay({title:'', subtitle:'', actionbar:'', titleColor:'§f', subtitleColor:'§f', actionbarColor:'§f'}); setShowPreview(false); }} className="absolute top-4 right-4 text-white hover:text-red-400 z-50 transition-colors">
                      <XIcon size={36} strokeWidth={2} />
                  </button>

                  {previewSceneId === null ? (
                      /* World View (NPC Selector) */
                      <div className="relative w-full max-w-4xl bg-[#c6c6c6] border-[3px] border-[#1e1e1e] rounded-xl shadow-[inset_3px_3px_0px_#ffffff,inset_-3px_-3px_0px_#555555] p-8 flex flex-col items-center z-10">
                         <h2 className="text-[#3c3c3c] text-3xl font-bold tracking-wide mb-8 drop-shadow-sm">Select an NPC</h2>
                         <div className="flex gap-8 flex-wrap justify-center max-w-3xl">
                            {cast.map(actor => (
                                <div key={actor.id} onClick={() => initiateDialogue(actor.id)} className="cursor-pointer group flex flex-col items-center bg-[#ececec] border-[3px] border-[#1e1e1e] rounded-lg p-4 shadow-[2px_2px_0px_rgba(0,0,0,0.15)] hover:bg-white transition-all active:scale-95">
                                   <div className="w-[160px] h-[220px] pointer-events-none flex items-center justify-center mb-2 overflow-hidden rounded-md">
                                       <SkinViewer skinUrl={actor.skinUrl} animation="idle" camX={0} camY={14} camZ={45} zoom={0.6} width={160} height={220} />
                                   </div>
                                   <div className="text-[#1e1e1e] text-xl font-bold bg-[#c6c6c6] px-4 py-1 rounded border-2 border-[#1e1e1e] shadow-inner w-full text-center truncate">{actor.name}</div>
                                </div>
                            ))}
                         </div>
                      </div>
                  ) : (
                      /* Authentic Bedrock UI Layout */
                      <div className="relative w-full max-w-4xl bg-[#c6c6c6] border-[3px] border-[#1e1e1e] rounded-xl shadow-[inset_3px_3px_0px_#ffffff,inset_-3px_-3px_0px_#555555] p-3 flex flex-col z-10">
                        
                        {/* Title Bar */}
                        <div className="relative flex justify-center items-center py-2 mb-3">
                          <h3 className="text-[#3c3c3c] text-2xl tracking-wide font-bold">{previewActor.name}</h3>
                          <button onClick={() => setPreviewSceneId(null)} className="absolute right-2 top-0 p-1 text-[#555] hover:text-[#1e1e1e] transition-colors"><XIcon size={32} strokeWidth={2.5} /></button>
                        </div>

                        <div className="flex flex-row gap-6 px-4 pb-2 w-full min-h-[320px]">
                          
                          {/* Left Column: Avatar */}
                          <div className="flex flex-col w-[200px] flex-shrink-0">
                             {/* Avatar Frame */}
                             <div className="w-full h-[280px] bg-[#484848] border-[3px] border-[#1e1e1e] shadow-[inset_4px_4px_0px_#222,inset_-4px_-4px_0px_#666] flex items-center justify-center overflow-hidden">
                                <div className="pointer-events-none">
                                  <SkinViewer skinUrl={previewActor.skinUrl} animation="idle" camX={-15} camY={12} camZ={40} zoom={0.75} width={194} height={274} />
                                </div>
                             </div>
                          </div>

                          {/* Right Column: Dialogue Text */}
                          <div className="flex-1 relative bg-white border-[3px] border-[#1e1e1e] rounded-2xl p-6 shadow-[3px_3px_0px_rgba(0,0,0,0.15)] flex flex-col h-[280px]">
                             {/* Pointer */}
                              <div className="absolute top-[40px] -left-[24px] w-0 h-0 border-y-[16px] border-y-transparent border-r-[24px] border-r-[#1e1e1e]">
                                <div className="absolute -top-[12px] left-[4px] w-0 h-0 border-y-[12px] border-y-transparent border-r-[18px] border-r-white"></div>
                                <div className="absolute -top-[12px] left-[21px] w-[8px] h-[24px] bg-white z-10"></div>
                              </div>

                              <div className="overflow-y-auto custom-scrollbar flex-1 pr-2">
                                <p className="text-[#1e1e1e] text-[22px] leading-snug whitespace-pre-wrap font-minecraft">{currentPreviewNode.data.text}</p>
                              </div>
                          </div>

                        </div>
                        
                        {/* Bottom Full-Width Area: 3x2 Grid for Buttons */}
                        <div className="px-4 pb-2 pt-2 w-full">
                            <div className="grid grid-cols-3 gap-3 w-full">
                                {generatePlaytestButtons()}
                            </div>
                        </div>
                      </div>
                  )}
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
