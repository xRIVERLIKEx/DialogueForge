<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Dialogue Forge</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @font-face {
          font-family: 'Minecraft';
          src: url('https://fonts.cdnfonts.com/s/14894/Minecraft.woff') format('woff');
        }
        .font-minecraft {
          font-family: 'Minecraft', 'Courier New', Courier, monospace;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #777; }
        
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icon = ({ d, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d}
            </svg>
        );
        const Download = (p) => <Icon {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
        const Play = (p) => <Icon {...p} d={<polygon points="5 3 19 12 5 21 5 3"/>} />;
        const Plus = (p) => <Icon {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
        const UserIcon = (p) => <Icon {...p} d={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />;
        const Settings = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} />;
        const Trash2 = (p) => <Icon {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const BoxIcon = (p) => <Icon {...p} d={<><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>} />;
        const FileText = (p) => <Icon {...p} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>} />;
        const MessageSquare = (p) => <Icon {...p} d={<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>} />;
        const XIcon = (p) => <Icon {...p} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const UploadIcon = (p) => <Icon {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>} />;
        const ZoomIn = (p) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></>} />;
        const ZoomOut = (p) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></>} />;
        const Maximize = (p) => <Icon {...p} d={<><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></>} />;
        const Network = (p) => <Icon {...p} d={<><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></>} />;

        const generateUUID = () => {
          return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
          });
        };

        const generatePackIcon = () => {
          return new Promise(resolve => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; 
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, 64, 64);
            
            const pixels = [
              "                ",
              "  BBBBBBBBBBBB  ",
              " BWWWWWWWWWWWWB ",
              " BWWWWWWWWWWWWB ",
              " BWWBBWBBWBBWWB ",
              " BWWBBWBBWBBWWB ",
              " BWWWWWWWWWWWWB ",
              " BWWWWWWWWWWWWB ",
              "  BBBBBBBWWWBB  ",
              "        BWWB    ",
              "        BWB     ",
              "        BB      ",
              "                ",
              "                ",
              "                ",
              "                "
            ];
            
            pixels.forEach((row, y) => {
              for (let x = 0; x < 16; x++) {
                if (row[x] === ' ') continue;
                ctx.fillStyle = row[x] === 'B' ? '#111111' : '#FFFFFF';
                ctx.fillRect(x * 4, y * 4, 4, 4);
              }
            });
            
            canvas.toBlob(blob => resolve(blob), 'image/png');
          });
        };

        const SkinViewer = ({ skinUrl, animation = "walk", camX = 20, camY = 15, camZ = 40 }) => {
          const viewerRef = useRef(null);
          const skinViewerInstance = useRef(null);
          const [scriptLoaded, setScriptLoaded] = useState(!!window.skinview3d);

          useEffect(() => {
            if (window.skinview3d) {
              setScriptLoaded(true);
              return;
            }
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/bundles/skinview3d.bundle.js";
            script.async = true;
            script.onload = () => setScriptLoaded(true);
            document.head.appendChild(script);
          }, []);

          useEffect(() => {
            if (!scriptLoaded || !viewerRef.current) return;

            if (!skinViewerInstance.current) {
              skinViewerInstance.current = new window.skinview3d.SkinViewer({
                canvas: viewerRef.current,
                width: 250,
                height: 350,
                preserveDrawingBuffer: true
              });
              skinViewerInstance.current.camera.position.set(camX, camY, camZ);
              skinViewerInstance.current.zoom = 0.8;
            }

            const viewer = skinViewerInstance.current;
            viewer.loadSkin(skinUrl).catch(err => console.warn("Failed to load skin:", err));
            
            if (animation === "walk") {
              viewer.animation = new window.skinview3d.WalkingAnimation();
            } else if (animation === "idle") {
              viewer.animation = new window.skinview3d.IdleAnimation();
            } else {
              viewer.animation = null;
            }
          }, [scriptLoaded, skinUrl, animation]);

          useEffect(() => {
            return () => {
              if (skinViewerInstance.current) {
                skinViewerInstance.current.dispose();
                skinViewerInstance.current = null;
              }
            };
          }, []);

          return (
            <div className="relative group">
              <canvas ref={viewerRef} className="rounded-lg bg-[#151515] border-2 border-[#333] shadow-inner" />
              <div className="absolute bottom-2 right-2 opacity-50 group-hover:opacity-100 transition-opacity pointer-events-none">
                <span className="bg-black/80 text-[10px] text-white px-2 py-1 rounded">3D Interactive</span>
              </div>
            </div>
          );
        };

        function App() {
          const [globalNpcName, setGlobalNpcName] = useState('My NPC');
          const [spawnEggBaseColor, setSpawnEggBaseColor] = useState('#EAB308');
          const [spawnEggOverlayColor, setSpawnEggOverlayColor] = useState('#111111');
          
          const [nodes, setNodes] = useState(() => {
            const canvasWidth = window.innerWidth - 640; 
            const centerX = Math.max(50, (canvasWidth / 2) - 128); 
            return [
              { id: 'start_scene', data: { text: 'Click to edit your opening dialogue.', isStart: true, hasCloseButton: false, closeButtonLabel: 'Leave' }, position: { x: centerX, y: 80 } }
            ];
          });
          const [edges, setEdges] = useState([]);
          
          const [selectedNode, setSelectedNode] = useState(null);
          const [selectedEdge, setSelectedEdge] = useState(null);

          const [zoom, setZoom] = useState(1);
          const [pan, setPan] = useState({ x: 0, y: 0 });
          const [isPanning, setIsPanning] = useState(false);
          const [panStart, setPanStart] = useState({ x: 0, y: 0 });

          const [packName, setPackName] = useState('DialogueAddon');
          const [skinUrl, setSkinUrl] = useState(() => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 64, 64);
            ctx.fillStyle = '#00FFFF';
            ctx.fillRect(0, 0, 32, 16);
            ctx.fillRect(16, 16, 24, 16);
            ctx.fillRect(40, 16, 16, 16);
            ctx.fillRect(32, 48, 16, 16);
            ctx.fillRect(0, 16, 16, 16);
            ctx.fillRect(16, 48, 16, 16);
            return canvas.toDataURL();
          });
          
          const [showPreview, setShowPreview] = useState(false);
          const [previewSceneId, setPreviewSceneId] = useState('start_scene');
          const [isExporting, setIsExporting] = useState(false);
          const [showExportModal, setShowExportModal] = useState(false);

          const [pdfMode, setPdfMode] = useState({ active: false, width: null, height: null });
          const [isCapturing, setIsCapturing] = useState(false);

          const canvasRef = useRef(null);
          const [draggingNode, setDraggingNode] = useState(null);
          const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
          const [connectingFrom, setConnectingFrom] = useState(null);
          const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

          const handleCanvasMouseDown = (e) => {
            setSelectedNode(null);
            setSelectedEdge(null);
            setIsPanning(true);
            setPanStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
          };

          const handleMouseMove = (e) => {
            if (!canvasRef.current) return;
            const rect = canvasRef.current.getBoundingClientRect();
            
            if (isPanning) {
               setPan({ x: e.clientX - panStart.x, y: e.clientY - panStart.y });
               return; 
            }

            const x = (e.clientX - rect.left - pan.x) / zoom;
            const y = (e.clientY - rect.top - pan.y) / zoom;
            
            setMousePos({ x, y });

            if (draggingNode) {
              setNodes(nds => nds.map(n => n.id === draggingNode ? {
                ...n, position: { x: x - dragOffset.x, y: y - dragOffset.y }
              } : n));
            }
          };

          const handleNodeMouseDown = (e, node) => {
            e.stopPropagation(); 
            setSelectedNode(node);
            setSelectedEdge(null);
            
            if (!canvasRef.current) return;
            const rect = canvasRef.current.getBoundingClientRect();
            
            const mouseX = (e.clientX - rect.left - pan.x) / zoom;
            const mouseY = (e.clientY - rect.top - pan.y) / zoom;
            
            setDraggingNode(node.id);
            setDragOffset({ x: mouseX - node.position.x, y: mouseY - node.position.y });
          };

          const handleSourceMouseDown = (e, nodeId) => {
            e.stopPropagation();
            setConnectingFrom(nodeId);
          };

          const handleTargetMouseUp = (e, nodeId) => {
            e.stopPropagation();
            if (connectingFrom && connectingFrom !== nodeId) {
              const newEdge = {
                id: `edge_${Date.now()}`,
                source: connectingFrom,
                target: nodeId,
                data: { label: 'Continue', commands: '' }
              };
              setEdges(eds => [...eds, newEdge]);
              setSelectedEdge(newEdge);
              setSelectedNode(null);
            }
            setConnectingFrom(null);
          };
          
          const handleMouseUp = () => {
            setDraggingNode(null);
            setConnectingFrom(null);
            setIsPanning(false);
          };

          const handleWheel = (e) => {
            const zoomSensitivity = 0.001;
            setZoom(z => Math.max(0.2, Math.min(2, z - (e.deltaY * zoomSensitivity))));
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (event) => {
                setSkinUrl(event.target.result);
                e.target.value = null; 
              };
              reader.readAsDataURL(file);
            }
          };

          const updateNodeData = (id, newData) => {
            setNodes((nds) =>
              nds.map((node) => {
                if (node.id === id) {
                  const updatedNode = { ...node, data: { ...node.data, ...newData } };
                  if (selectedNode?.id === id) setSelectedNode(updatedNode);
                  return updatedNode;
                }
                return node;
              })
            );
          };

          const updateEdgeData = (id, newData) => {
            setEdges((eds) =>
              eds.map((edge) => {
                if (edge.id === id) {
                  const updatedEdge = { ...edge, data: { ...edge.data, ...newData } };
                  if (selectedEdge?.id === id) setSelectedEdge(updatedEdge);
                  return updatedEdge;
                }
                return edge;
              })
            );
          };

          const fitView = (targetNodes = nodes) => {
            if (targetNodes.length === 0 || !canvasRef.current) {
              setZoom(1);
              setPan({ x: 0, y: 0 });
              return;
            }

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            targetNodes.forEach(node => {
              if (node.position.x < minX) minX = node.position.x;
              if (node.position.y < minY) minY = node.position.y;
              if (node.position.x + 256 > maxX) maxX = node.position.x + 256; 
              if (node.position.y + 144 > maxY) maxY = node.position.y + 144; 
            });

            const bbWidth = maxX - minX;
            const bbHeight = maxY - minY;
            const padding = 100; 

            const viewportWidth = canvasRef.current.clientWidth;
            const viewportHeight = canvasRef.current.clientHeight;

            let newZoom = Math.min(
              (viewportWidth - padding) / bbWidth,
              (viewportHeight - padding) / bbHeight,
              2 
            );
            newZoom = Math.max(newZoom, 0.2); 

            const centerX = minX + bbWidth / 2;
            const centerY = minY + bbHeight / 2;

            const panX = (viewportWidth / 2) - (centerX * newZoom);
            const panY = (viewportHeight / 2) - (centerY * newZoom);

            setZoom(newZoom);
            setPan({ x: panX, y: panY });
          };

          const autoLayout = () => {
            if (nodes.length === 0) return;

            const children = {};
            edges.forEach(e => {
              if (!children[e.source]) children[e.source] = [];
              children[e.source].push(e.target);
            });

            const levels = {};
            const visited = new Set();
            const queue = [];

            const startNode = nodes.find(n => n.data.isStart) || nodes[0];
            queue.push({ id: startNode.id, level: 0 });

            while (queue.length > 0) {
              const { id, level } = queue.shift();
              if (!visited.has(id)) {
                visited.add(id);
                levels[id] = level;
                const nodeChildren = children[id] || [];
                nodeChildren.forEach(childId => queue.push({ id: childId, level: level + 1 }));
              }
            }

            let maxLevel = Math.max(...Object.values(levels), 0);
            nodes.forEach(n => {
              if (!visited.has(n.id)) {
                maxLevel++;
                levels[n.id] = maxLevel;
              }
            });

            const levelGroups = {};
            nodes.forEach(n => {
              const lvl = levels[n.id];
              if (!levelGroups[lvl]) levelGroups[lvl] = [];
              levelGroups[lvl].push(n);
            });

            const NODE_WIDTH = 340; 
            const NODE_HEIGHT = 280; 

            const newNodes = nodes.map(node => {
              const lvl = levels[node.id];
              const group = levelGroups[lvl];
              const index = group.findIndex(n => n.id === node.id);
              
              const totalWidth = group.length * NODE_WIDTH;
              const startX = -(totalWidth / 2);

              return { 
                ...node, 
                position: { 
                  x: startX + (index * NODE_WIDTH), 
                  y: lvl * NODE_HEIGHT 
                } 
              };
            });

            setNodes(newNodes);
            // Pass the mathematically perfect array directly to the camera!
            setTimeout(() => fitView(newNodes), 50);
          };

          const addDialogueNode = () => {
            const hash = Math.random().toString(36).substring(2, 6);
            const id = `scene_${hash}`;
            const newNode = {
              id,
              data: { text: 'Click to edit this new dialogue.', hasCloseButton: false, closeButtonLabel: 'Goodbye' },
              position: { x: Math.random() * 200 + 100, y: Math.random() * 200 + 100 },
            };
            setNodes((nds) => nds.concat(newNode));
          };

          const exportAddon = async () => {
            if (!window.JSZip) {
                console.warn("Export library is still loading. Please try again in a moment.");
                return;
            }

            setIsExporting(true);
            try {
                const zip = new window.JSZip();
                
                const bpUuid1 = generateUUID();
                const bpUuid2 = generateUUID();
                const rpUuid1 = generateUUID();
                const rpUuid2 = generateUUID();

                const packIconBlob = await generatePackIcon();
                const npcDisplayName = globalNpcName || "Custom NPC";
                const firstNode = nodes.find(n => n.data.isStart) || nodes[0];
                
                const hash = Math.random().toString(36).substring(2, 6);
                const safeName = (packName || "custom").toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + hash;
                const entityId = `forge:${safeName}_npc`;
                const fileName = `${safeName}_npc`;

                // ==========================================
                // 1. BEHAVIOR PACK (Logic & Dialogue)
                // ==========================================
                const bpFolder = zip.folder(`${packName.replace(/\s+/g, '_')}_BP`);
                
                bpFolder.file("pack_icon.png", packIconBlob);
                bpFolder.file("manifest.json", JSON.stringify({
                  format_version: 2,
                  header: { name: `${packName} BP`, description: "NPC Logic and Dialogue", uuid: bpUuid1, version: [1, 0, 0], min_engine_version: [1, 20, 0] },
                  modules: [ { type: "data", uuid: bpUuid2, version: [1, 0, 0] } ],
                  dependencies: [ { uuid: rpUuid1, version: [1, 0, 0] } ]
                }, null, 2));

                const dialogueScenes = nodes.map(node => {
                  const outgoingEdges = edges.filter(e => e.source === node.id);
                  const buttons = outgoingEdges.map(e => {
                    const customCommands = e.data.commands ? e.data.commands.split('\n').filter(cmd => cmd.trim() !== '') : [];
                    return {
                      name: e.data.label || "Continue",
                      commands: [ 
                        `/playanimation @s talking`,
                        `/dialogue open @s @p ${safeName}_${e.target}`, 
                        ...customCommands 
                      ]
                    };
                  });

                  if (node.data.hasCloseButton || outgoingEdges.length === 0) {
                    buttons.push({
                      name: node.data.closeButtonLabel || "Goodbye"
                    });
                  }

                  return {
                    scene_tag: `${safeName}_${node.id}`,
                    npc_name: globalNpcName || "Custom NPC",
                    text: node.data.text,
                    buttons: buttons.length > 0 ? buttons : undefined
                  };
                });

                bpFolder.file(`dialogue/${fileName}_scenes.json`, JSON.stringify({
                  format_version: "1.17",
                  "minecraft:npc_dialogue": { scenes: dialogueScenes }
                }, null, 2));

                bpFolder.file(`entities/${fileName}.json`, JSON.stringify({
                  format_version: "1.20.0",
                  "minecraft:entity": {
                    description: {
                      identifier: entityId,
                      is_spawnable: true,
                      is_summonable: true,
                      is_experimental: false
                    },
                    components: {
                      "minecraft:npc": {},
                      "minecraft:collision_box": { "width": 0.6, "height": 1.9 },
                      "minecraft:health": { "value": 20, "max": 20 },
                      "minecraft:physics": { "has_gravity": true, "has_collision": true },
                      "minecraft:pushable": { "is_pushable": false, "is_pushable_by_piston": false },
                      "minecraft:damage_sensor": { "triggers": { "cause": "all", "deals_damage": false } },
                      "minecraft:nameable": { "always_show": true, "allow_name_tags": true },
                      "minecraft:behavior.look_at_player": { "priority": 1, "look_distance": 8, "probability": 1.0 },
                      "minecraft:type_family": { "family": ["npc", "mob"] },
                      "minecraft:interact": {
                        "interactions": [
                          {
                            "on_interact": {
                              "filters": { "test": "is_family", "subject": "other", "value": "player" },
                              "event": `${entityId}:start_dialogue`,
                              "target": "self"
                            },

                }, null, 2));

                rpFolder.file(`animations/${fileName}.animation.json`, JSON.stringify({
                  "format_version": "1.8.0",
                  "animations": {
                    "animation.npc.speech": {
                      "animation_length": 2,
                      "bones": {
                        "head": {
                          "rotation": {
                            "0.0": [5.00286, -2.49962, 0.04366],
                            "0.25": [12.55246, 2.46801, 0.61405],
                            "0.5": [-2.5, 0, 0],
                            "0.75": [5.00286, -2.49962, 0.04366],
                            "1.0": [12.50286, -2.49962, 0.04366],
                            "1.25": [-2.54048, 2.47242, -0.37257],
                            "1.5": [5.00286, -2.49962, 0.04366],
                            "1.75": [12.49664, -4.98356, -0.23938],
                            "2.0": [-2.5, 0, 0]
                          }
                        },
                        "rightArm": {
                          "rotation": {
                            "0.0": [10, 0, 0],
                            "0.25": [-7.35932, 2.24944, 7.15656],
                            "0.5": [-6.93839, 4.46375, 14.33501],
                            "0.75": [-7.43428, 3.20008, 6.9255],
                            "1.0": [-17.28777, 4.34921, 9.15061],
                            "1.25": [-9.78777, 4.34921, 9.15061],
                            "1.5": [-9.94909, 3.49944, 6.79391],
                            "1.75": [-17.44909, 3.49944, 6.79391],

                        },
                        "leftArm": {
                          "rotation": {
                            "0.0": [-12.49952, -0.02181, 0.0001],
                            "0.25": [-39.96985, -0.17101, -17.4993],
                            "0.5": [-59.96985, -0.17101, -17.4993],

                            "1.0": [-52.21362, -4.77624, -23.42605],
                            "1.25": [-57.21362, -4.77624, -23.42605],

                rpFolder.file("texts/en_US.lang", `item.spawn_egg.entity.${entityId}.name=${npcDisplayName}\nentity.${entityId}.name=${npcDisplayName}`);

                const res = await fetch(skinUrl);
                const skinBlob = await res.blob();
                rpFolder.file(`textures/entity/${fileName}.png`, skinBlob);

                // ==========================================
                // 3. COMPILE AND DOWNLOAD
                // ==========================================
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${packName.replace(/\s+/g, '_')}.mcaddon`;
                link.click();
            } catch (err) {
                console.error("Failed to generate addon:", err);
                console.warn("Failed to export Addon. Check console for details.");

                setIsExporting(false);
                setShowExportModal(false);

          };

          const exportPDF = async () => {
            if (!window.jspdf || !window.html2canvas) {
              console.warn("PDF libraries are still loading. Please try again in a moment.");
              return;
            }
            if (nodes.length === 0) return;

            setIsExporting(true);
            setIsCapturing(true); 
            
            try {
              let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
              nodes.forEach(node => {
                if (node.position.x < minX) minX = node.position.x;
                if (node.position.y < minY) minY = node.position.y;
                if (node.position.x + 256 > maxX) maxX = node.position.x + 256; 
                if (node.position.y + 160 > maxY) maxY = node.position.y + 160; 
              });

              minX -= 50; minY -= 50; maxX += 50; maxY += 50;
              const bbWidth = maxX - minX;
              const bbHeight = maxY - minY;

              setZoom(1);
              setPan({ x: -minX, y: -minY });

              setPdfMode({ active: true, width: bbWidth, height: bbHeight });
              await new Promise(resolve => setTimeout(resolve, 800));

              const canvasCapture = await window.html2canvas(canvasRef.current, {
                scale: 1.25, 
                backgroundColor: '#ffffff',
                useCORS: true,
                width: bbWidth,
                height: bbHeight,
                windowWidth: bbWidth,
                windowHeight: bbHeight
              });
              
              const graphImgData = canvasCapture.toDataURL('image/png');
              if (graphImgData === 'data:,') throw new Error("Browser memory limit reached. The graph is too large.");
              
              const pdfWidth = bbWidth; 
              const pdfHeight = bbHeight + 120; 
              
              const { jsPDF } = window.jspdf;
              const pdf = new jsPDF({
                orientation: pdfWidth > pdfHeight ? 'l' : 'p',
                unit: 'px',
                format: [pdfWidth, pdfHeight]
              });

              pdf.setFillColor(255, 255, 255);
              pdf.rect(0, 0, pdfWidth, pdfHeight, 'F');

              pdf.setTextColor(30, 30, 30);
              pdf.setFont("helvetica", "bold");
              pdf.setFontSize(28);
              pdf.text(packName || "Dialogue Quest", 40, 50);

              pdf.setTextColor(100, 100, 100);
              pdf.setFont("helvetica", "normal");
              pdf.setFontSize(16);
              pdf.text(`NPC Character: ${globalNpcName || "Unnamed NPC"}`, 40, 80);

              const npcCanvas = document.querySelector('aside canvas');
              if (npcCanvas) {
                const npcImgData = npcCanvas.toDataURL('image/png');
                if (npcImgData && npcImgData !== 'data:,') {
                  pdf.addImage(npcImgData, 'PNG', pdfWidth - 140, 20, 80, 110); 
                }
              }

              pdf.addImage(graphImgData, 'PNG', 0, 120, bbWidth, bbHeight);
              pdf.save(`${(packName || "Dialogue").replace(/\s+/g, '_')}_Report.pdf`);

            } catch (err) {
              console.error("PDF generation failed:", err);
              console.warn("PDF Generation Failed. Check console.");
            } finally {
              setPdfMode({ active: false, width: null, height: null });
              setIsCapturing(false); 
              setIsExporting(false);
            }

                      <div className="space-y-1">

                      </div>
                    </div>
                  </section>

                  <section className="space-y-4">

                    <div className="flex flex-col gap-3 items-center">
                      <SkinViewer skinUrl={skinUrl} camX={-20} />
                      
                      <div className="relative w-full">
                        <input 
                          type="file" 
                          accept=".png" 
                          onChange={handleFileUpload} 
                          className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                        />
                        <div className="w-full bg-[#2a2a2a] border border-dashed border-[#555] rounded py-2 text-center text-xs text-gray-400 flex items-center justify-center gap-2 hover:bg-[#333] transition-colors">
                          <UploadIcon size={14} /> Upload Skin (.png)
                        </div>
                      </div>
                    </div>
                  </section>
                </div>

                <div className="p-4 border-t border-[#333] bg-[#252526] space-y-2">
                  <button 
                    onClick={() => setShowExportModal(true)}

                  >
                    <Download size={16} /> Export Addon...
                  </button>
                  <button 
                    onClick={exportPDF}
                    disabled={isExporting}
                    className="w-full flex items-center justify-center gap-2 bg-[#333] hover:bg-[#444] text-white py-2.5 rounded font-bold text-sm transition-all shadow-lg active:scale-95 border border-[#555]"
                  >
                    <FileText size={16} /> {isExporting && isCapturing ? 'Generating PDF...' : 'Download PDF Report'}
                  </button>
                </div>
              </aside>

              {/* CENTER: Custom Node Canvas Area */}
              <main 
                ref={canvasRef}
                className={`flex-1 relative select-none ${pdfMode.active ? 'bg-white' : 'bg-[#1e1e1e] overflow-hidden'}`}
                style={pdfMode.active ? { position: 'absolute', top: 0, left: 0, zIndex: 100, width: `${pdfMode.width}px`, height: `${pdfMode.height}px`, minWidth: `${pdfMode.width}px`, minHeight: `${pdfMode.height}px`, flex: 'none' } : {}}

                <div 
                  className="absolute top-0 left-0 w-full h-full pointer-events-none"
                  style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: '0px 0px' }}

                  <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" className="absolute top-0 left-0 z-0 pointer-events-none" style={{ overflow: 'visible' }}>
                    {edges.map(edge => {
                       const sourceNode = nodes.find(n => n.id === edge.source);
                       const targetNode = nodes.find(n => n.id === edge.target);
                       if (!sourceNode || !targetNode) return null;
                       
                       const startX = sourceNode.position.x + 128;
                       const startY = sourceNode.position.y + 160; 
                       const endX = targetNode.position.x + 128;
                       const endY = targetNode.position.y;

                       return (
                         <React.Fragment key={edge.id}>
                           <path 
                              d={`M ${startX} ${startY} C ${startX} ${startY + 80}, ${endX} ${endY - 80}, ${endX} ${endY}`}

                              fill="transparent"
                              className="pointer-events-auto cursor-pointer transition-all"

                    {connectingFrom && (
                      <path 
                        d={`M ${nodes.find(n => n.id === connectingFrom).position.x + 128} ${nodes.find(n => n.id === connectingFrom).position.y + 160} C ${nodes.find(n => n.id === connectingFrom).position.x + 128} ${nodes.find(n => n.id === connectingFrom).position.y + 200}, ${mousePos.x} ${mousePos.y - 50}, ${mousePos.x} ${mousePos.y}`}
                        stroke="#eab308"

                    )}
                  </svg>

                  <div className="absolute inset-0 pointer-events-none z-10" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
                      {edges.map(edge => {

                       const startX = sourceNode.position.x + 128;
                       const startY = sourceNode.position.y + 160;
                       const endX = targetNode.position.x + 128;
                       const endY = targetNode.position.y;
                       const midX = (startX + endX) / 2;

                       return (

                              style={{ left: midX, top: midY, transform: 'translate(-50%, -50%)' }}
                              onMouseDown={(e) => e.stopPropagation()}
                              onClick={(e) => { e.stopPropagation(); setSelectedEdge(edge); setSelectedNode(null); }}
                          >
                              {edge.data.label || 'Continue'}

                            style={{ left: node.position.x, top: node.position.y }}

                      <button 
                        onClick={() => {
                          setNodes(nds => nds.filter(n => n.id !== selectedNode.id));
                          setEdges(eds => eds.filter(e => e.source !== selectedNode.id && e.target !== selectedNode.id));
                          setSelectedNode(null);
                        }}
                        className="w-full flex items-center justify-center gap-2 mt-4 p-2 bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20 rounded text-xs font-bold transition-all"
                      >
                        <Trash2 size={14} /> Delete Scene
                      </button>
                    </div>
                  ) : selectedEdge ? (
                    <div className="space-y-5 animate-in fade-in duration-200">
                      <div className="flex items-center gap-2 text-yellow-500 mb-4 pb-2 border-b border-[#444]">
                        <MessageSquare size={16} /> <span className="font-bold text-sm">Button Edit</span>
                      </div>
                      
                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">Button Label</label>
                        <input 
                          className="w-full bg-[#333] border border-[#444] rounded px-3 py-2 text-sm focus:border-yellow-500 outline-none transition-colors"
                          placeholder="e.g. Continue..."
                          value={selectedEdge.data.label || ''}
                          onChange={(e) => updateEdgeData(selectedEdge.id, { label: e.target.value })}
                        />
                      </div>

                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">Commands (Optional)</label>
                        <textarea 
                          className="w-full bg-[#333] border border-[#444] rounded px-3 py-2 text-sm h-24 resize-none focus:border-yellow-500 outline-none transition-colors font-mono text-xs"
                          placeholder="/give @p gold_ingot"
                          value={selectedEdge.data.commands || ''}
                          onChange={(e) => updateEdgeData(selectedEdge.id, { commands: e.target.value })}
                        />
                      </div>

                      <button 
                        onClick={() => {
                          setEdges(eds => eds.filter(e => e.id !== selectedEdge.id));
                          setSelectedEdge(null);
                        }}
                        className="w-full flex items-center justify-center gap-2 mt-4 p-2 bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20 rounded text-xs font-bold transition-all"
                      >
                        <Trash2 size={14} /> Delete Connection
                      </button>
                    </div>
                  ) : (
                    <div className="flex flex-col items-center justify-center h-full text-gray-500 space-y-4">
                      <Settings size={32} className="opacity-20" />
                      <p className="text-xs font-bold uppercase tracking-widest text-center">Select a node or<br/>connection to edit</p>
                    </div>
                  )}
                </div>
              </aside>

              {/* Playtest Simulation Modal */}
              {showPreview && currentPreviewNode && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                  <div className="relative w-full max-w-4xl bg-[#c6c6c6] border-2 border-[#1e1e1e] shadow-[inset_2px_2px_0px_#ffffff,inset_-2px_-2px_0px_#555555] p-2 flex flex-col font-minecraft select-none">
                    
                    <div className="relative flex justify-center items-center py-2 mb-2">
                      <h3 className="text-[#3c3c3c] text-[22px] tracking-wide">{globalNpcName || "NPC"}</h3>
                      <button 
                        onClick={() => setShowPreview(false)}
                        className="absolute right-2 top-0 p-1 text-[#555] hover:text-[#1e1e1e] transition-colors"
                      >
                        <XIcon size={28} strokeWidth={2.5} />
                      </button>
                    </div>

                    <div className="flex flex-row gap-6 px-4 pb-2">
                      <div className="w-[194px] h-[274px] bg-[#151515] border-[3px] border-[#1e1e1e] shadow-[inset_3px_3px_0px_#222,inset_-3px_-3px_0px_#666] relative flex-shrink-0 flex items-center justify-center overflow-hidden">
                         <SkinViewer 
                            skinUrl={skinUrl} 
                            animation="idle" 
                            camX={-15} 
                            camY={10} 
                            camZ={40} 
                            zoom={0.9} 
                         />
                      </div>

                      <div className="flex-1 relative bg-[#ececec] border-2 border-[#1e1e1e] rounded-sm p-6 shadow-[2px_2px_0px_rgba(0,0,0,0.15)] flex flex-col">
                        <div className="absolute top-[40px] -left-[24px] w-0 h-0 border-y-[16px] border-y-transparent border-r-[24px] border-r-[#1e1e1e]">
                          <div className="absolute -top-[12px] left-[3px] w-0 h-0 border-y-[12px] border-y-transparent border-r-[24px] border-r-[#ececec]"></div>
                        </div>

                        <div className="overflow-y-auto custom-scrollbar flex-1 pr-2">
                          <p className="text-[#1e1e1e] text-[22px] leading-snug">
                            {currentPreviewNode.data.text}
                          </p>
                        </div>
                      </div>
                    </div>

                    <div className="flex flex-row flex-wrap justify-center gap-2 mt-4 px-4 pb-2 w-full">
                      {previewOptions.map((edge, idx) => (
                        <button 
                          key={idx}
                          onClick={() => setPreviewSceneId(edge.target)}
                          className="flex-1 bg-[#c6c6c6] border-2 border-[#1e1e1e] shadow-[inset_2px_2px_0px_#ffffff,inset_-2px_-2px_0px_#555555] active:shadow-[inset_2px_2px_0px_#555555,inset_-2px_-2px_0px_#ffffff] py-2.5 px-6 min-w-[150px] max-w-[400px] text-center text-[#1e1e1e] text-xl transition-all focus:outline-none"
                        >
                          {edge.data.label || "Continue"}
                        </button>
                      ))}
                      
                      {(currentPreviewNode.data.hasCloseButton || previewOptions.length === 0) && (
                        <button 
                          onClick={() => setShowPreview(false)}
                          className="flex-1 bg-[#c6c6c6] border-2 border-[#1e1e1e] shadow-[inset_2px_2px_0px_#ffffff,inset_-2px_-2px_0px_#555555] active:shadow-[inset_2px_2px_0px_#555555,inset_-2px_-2px_0px_#ffffff] py-2.5 px-6 min-w-[150px] max-w-[400px] text-center text-[#1e1e1e] text-xl transition-all focus:outline-none"
                        >
                          {currentPreviewNode.data.closeButtonLabel || "Goodbye"}
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* Export Modal */}
              {showExportModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                  <div className="bg-[#252526] border border-[#444] rounded-xl shadow-2xl p-6 w-full max-w-md flex flex-col gap-6 animate-in fade-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center border-b border-[#444] pb-3">
                      <h2 className="text-lg font-bold text-white flex items-center gap-2">
                        <Download size={20} className="text-green-500" /> Export Options
                      </h2>
                      <button onClick={() => setShowExportModal(false)} className="text-gray-400 hover:text-white transition-colors">
                        <XIcon size={20} />
                      </button>
                    </div>

                    <div className="flex flex-col items-center gap-4">
                      <p className="text-sm text-gray-300 text-center">Customize your NPC's Spawn Egg appearance in the creative inventory.</p>
                      
                      <svg viewBox="0 0 16 16" className="w-32 h-32 drop-shadow-2xl" shapeRendering="crispEdges">
                         {[
                            "      BBBB      ",
                            "    BBBBSSBB    ",
                            "   BBBBBBSSBB   ",
                            "  BBBBBBBBBBBB  ",
                            "  SSBBBBBBBBBB  ",
                            " BSSBBBBBBBSSBB ",
                            " BBBBBBBBBBSSBB ",
                            " BBBBBBBBBBBBBB ",
                            " BBBBBBBSSBBBBB ",
                            " BBBBBBBSSBBBBB ",
                            " BBBBBBBBBBBBBB ",
                            "  BBBBBBBBBBSS  ",
                            "  BBSSBBBBBBSS  ",
                            "   BBSSBBBBBB   ",
                            "    BBBBBBBB    ",
                            "      BBBB      "
                         ].map((row, y) => 
                           row.split('').map((pixel, x) => {
                             if (pixel === ' ') return null;
                             const color = pixel === 'S' ? spawnEggOverlayColor : spawnEggBaseColor;
                             return <rect key={`base-${x}-${y}`} x={x} y={y} width="1.05" height="1.05" fill={color} />;
                           })
                         )}

                         {[
                            "      1122      ",
                            "    11223344    ",
                            "   1122333445   ",
                            "  112333333455  ",
                            "  123333333455  ",
                            " 12233333334556 ",
                            " 12333333334556 ",
                            " 22333333334556 ",
                            " 23333333334556 ",
                            " 23333333334556 ",
                            " 23333333334566 ",
                            "  333333344566  ",
                            "  444444455666  ",
                            "   5555555666   ",
                            "    66666666    ",
                            "      6666      "
                         ].map((row, y) => 
                           row.split('').map((pixel, x) => {
                             if (pixel === ' ') return null;
                             let shade = 'transparent';
                             if (pixel === '1') shade = 'rgba(255,255,255,0.4)';
                             if (pixel === '2') shade = 'rgba(255,255,255,0.15)';
                             if (pixel === '4') shade = 'rgba(0,0,0,0.15)';
                             if (pixel === '5') shade = 'rgba(0,0,0,0.3)';
                             if (pixel === '6') shade = 'rgba(0,0,0,0.5)';
                             return <rect key={`shadow-${x}-${y}`} x={x} y={y} width="1.05" height="1.05" fill={shade} pointerEvents="none" />;
                           })
                         )}
                      </svg>

                      <div className="flex gap-4 w-full mt-2">
                        <div className="flex-1 space-y-2">
                          <label className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block text-center">Egg Base</label>
                          <input 
                            type="color" 
                            value={spawnEggBaseColor}
                            onChange={(e) => setSpawnEggBaseColor(e.target.value)}
                            className="w-full h-10 p-0 border-2 border-[#444] bg-[#111] cursor-pointer rounded-md overflow-hidden"
                          />
                        </div>
                        <div className="flex-1 space-y-2">
                          <label className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block text-center">Egg Spots</label>
                          <input 
                            type="color" 
                            value={spawnEggOverlayColor}
                            onChange={(e) => setSpawnEggOverlayColor(e.target.value)}
                            className="w-full h-10 p-0 border-2 border-[#444] bg-[#111] cursor-pointer rounded-md overflow-hidden"
                          />
                        </div>
                      </div>
                    </div>

                    <div className="flex gap-3 pt-4 border-t border-[#444]">
                      <button 
                        onClick={() => setShowExportModal(false)}
                        className="flex-1 bg-[#333] hover:bg-[#444] text-white py-2.5 rounded font-bold text-sm transition-all"
                      >
                        Cancel
                      </button>
                      <button 
                        onClick={exportAddon}
                        disabled={isExporting}
                        className="flex-1 bg-green-600 hover:bg-green-500 disabled:bg-gray-600 text-white py-2.5 rounded font-bold text-sm transition-all shadow-lg active:scale-95 flex justify-center items-center gap-2"
                      >
                        {isExporting ? 'Generating...' : 'Confirm & Download'}
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
