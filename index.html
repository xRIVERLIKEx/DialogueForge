        const generateDefaultSkin = (colorHex) => {
          const canvas = document.createElement('canvas');
          canvas.width = 64; canvas.height = 64;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = colorHex;
          ctx.fillRect(0, 0, 32, 16); ctx.fillRect(16, 16, 24, 16);
          ctx.fillRect(40, 16, 16, 16); ctx.fillRect(32, 48, 16, 16);
          ctx.fillRect(0, 16, 16, 16); ctx.fillRect(16, 48, 16, 16);
          return canvas.toDataURL();
        };

        const generatePackIcon = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(0,0,128,128); 
            ctx.fillStyle = '#000000';
            
            // Top border
            ctx.fillRect(24, 16, 80, 8); 
            
            // Bottom border (with gap for the tail)
            ctx.fillRect(24, 80, 48, 8); 
            ctx.fillRect(88, 80, 16, 8); 
            
            // Left and Right borders
            ctx.fillRect(16, 24, 8, 56); 
            ctx.fillRect(104, 24, 8, 56);
            
            // 4 Corners
            ctx.fillRect(20, 20, 4, 4); 
            ctx.fillRect(104, 20, 4, 4); 
            ctx.fillRect(20, 80, 4, 4); 
            ctx.fillRect(104, 80, 4, 4);
            
            // Redrawn clean Speech Bubble Tail (Pointing down-right)
            ctx.fillRect(72, 88, 8, 8);
            ctx.fillRect(80, 96, 8, 8);
            ctx.fillRect(88, 88, 8, 24); // Solid right edge of tail
            
            // The 3 ellipsis dots inside the bubble
            ctx.fillRect(40, 48, 12, 12); 
            ctx.fillRect(60, 48, 12, 12); 
            ctx.fillRect(80, 48, 12, 12);
            
            return canvas.toDataURL().split(',')[1];
        };

        const SkinViewer = ({ skinUrl, animation = "walk", camX = 20, camY = 15, camZ = 40, zoom = 0.8, width = 250, height = 350 }) => {
          const viewerRef = useRef(null);
          const skinViewerInstance = useRef(null);
          const [scriptLoaded, setScriptLoaded] = useState(!!window.skinview3d);

          useEffect(() => {
            if (window.skinview3d) {
              setScriptLoaded(true);
              return;
            }
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/skinview3d@3.0.0/bundles/skinview3d.bundle.js";
            script.async = true;
            script.onload = () => setScriptLoaded(true);
            document.head.appendChild(script);
          }, []);

          useEffect(() => {
            if (!scriptLoaded || !viewerRef.current) return;

            if (!skinViewerInstance.current) {
              skinViewerInstance.current = new window.skinview3d.SkinViewer({
                canvas: viewerRef.current,
                width: width,
                height: height,
                preserveDrawingBuffer: true
              });
            }
            
            skinViewerInstance.current.camera.position.set(camX, camY, camZ);
            skinViewerInstance.current.zoom = zoom;
            
            // Allow dynamic resize if props change
            skinViewerInstance.current.width = width;
            skinViewerInstance.current.height = height;
            
          }, [scriptLoaded, camX, camY, camZ, zoom, width, height]);

          useEffect(() => {
            if (!scriptLoaded || !skinViewerInstance.current) return;
            skinViewerInstance.current.loadSkin(skinUrl).catch(err => console.warn("Failed to load skin:", err));
            
            if (animation === "walk") {
              skinViewerInstance.current.animation = new window.skinview3d.WalkingAnimation();
            } else if (animation === "idle") {
              skinViewerInstance.current.animation = new window.skinview3d.IdleAnimation();
            } else {
              skinViewerInstance.current.animation = null;
            }
          }, [scriptLoaded, skinUrl, animation]);

          useEffect(() => {
            return () => {
              if (skinViewerInstance.current) {
                skinViewerInstance.current.dispose();
                skinViewerInstance.current = null;
              }
            };
          }, []);

          return (
            <div className="relative group w-full h-full flex items-center justify-center">
              <canvas ref={viewerRef} className="w-full h-full block rounded-lg" />
            </div>
          );
        };

        function App() {
          const [packName, setPackName] = useState('');
          const [nameError, setNameError] = useState(false);
          const [isDraggingSkin, setIsDraggingSkin] = useState(false);
          const [viewMode, setViewMode] = useState('nodes'); 
          const [isCopied, setIsCopied] = useState(false);
          
          const [cast, setCast] = useState([
            { id: 'char_1', name: 'My NPC', skinUrl: generateDefaultSkin(defaultColors[0]), eggBase: '#EAB308', eggOverlay: '#111111' }
          ]);
          const [activeActorId, setActiveActorId] = useState('char_1');
          
          const activeActor = cast.find(a => a.id === activeActorId) || cast[0];

          const [nodes, setNodes] = useState([]);
          const [edges, setEdges] = useState([]);
          
          const [nodeHeights, setNodeHeights] = useState({});
          
          const [selectedNodeIds, setSelectedNodeIds] = useState([]);
          const [selectedEdgeIds, setSelectedEdgeIds] = useState([]);

          const [showPreview, setShowPreview] = useState(false);
          const [previewSceneId, setPreviewSceneId] = useState(null); 
          const [playtestOverlay, setPlaytestOverlay] = useState({ title: '', subtitle: '', actionbar: '', titleColor: '§f', subtitleColor: '§f', actionbarColor: '§f' });
          const [npcStates, setNpcStates] = useState({});
          
          const [isExporting, setIsExporting] = useState(false);
          const [pdfMode, setPdfMode] = useState(false);
          const [loadError, setLoadError] = useState('');

          const canvasContainerRef = useRef(null);
          const fileInputRef = useRef(null);
          const clipboardRef = useRef({ nodes: [], edges: [] });
          
          const [zoom, setZoom] = useState(1);
          const [pan, setPan] = useState({ x: 0, y: 0 });
          const [isPanning, setIsPanning] = useState(false);

          const [dragStartMouse, setDragStartMouse] = useState(null);
          const [initialNodePositions, setInitialNodePositions] = useState({});
          
          const [selectionBox, setSelectionBox] = useState(null);
          const [connectingFrom, setConnectingFrom] = useState(null);
          const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

          // Undo/Redo State
          const historyRef = useRef([]);
          const historyIndexRef = useRef(-1);
          const isUndoRedoRef = useRef(false);
          const [canUndo, setCanUndo] = useState(false);
          const [canRedo, setCanRedo] = useState(false);
          
          // Latest state ref for keyboard events
          const latestStateRef = useRef({ nodes, edges, selectedNodeIds, selectedEdgeIds });
          useEffect(() => {
              latestStateRef.current = { nodes, edges, selectedNodeIds, selectedEdgeIds };
          }, [nodes, edges, selectedNodeIds, selectedEdgeIds]);

          useEffect(() => {
             const screenWidth = window.innerWidth || 1200;
             const canvasWidth = screenWidth - 640; 
             const centerNodeX = Math.max(100, (canvasWidth / 2) - 128); 
             
             setNodes([{ 
                 id: 'start_scene', 
                 data: { sceneName: 'Main Scene', text: 'Click here to edit this starting dialogue.', speakerId: 'char_1', isStart: true, hasCloseButton: false, closeButtonLabel: 'Close', despawnCast: false }, 
                 position: { x: centerNodeX, y: 80 } 
             }]);
          }, []);

          useEffect(() => {
            const observer = new ResizeObserver((entries) => {
                setNodeHeights(prev => {
                    let changed = false;
                    const next = { ...prev };
                    for (let entry of entries) {
                        const el = entry.target;
                        const id = el.id.replace('node_', '');
                        const h = el.offsetHeight;
                        if (next[id] !== h) {
                            next[id] = h;
                            changed = true;
                        }
                    }
                    return changed ? next : prev;
                });
            });

            nodes.forEach(n => {
                const el = document.getElementById(`node_${n.id}`);
                if (el) observer.observe(el);
            });

            return () => observer.disconnect();
          }, [nodes]);

          useEffect(() => {
              let timer;
              if (playtestOverlay.title || playtestOverlay.subtitle) {
                  timer = setTimeout(() => {
                      setPlaytestOverlay(prev => ({ ...prev, title: '', subtitle: '' }));
                  }, 3000);
              }
              return () => clearTimeout(timer);
          }, [playtestOverlay.title, playtestOverlay.subtitle]);

          // History tracking hook (Debounced)
          useEffect(() => {
              if (isUndoRedoRef.current) {
                  isUndoRedoRef.current = false;
                  return;
              }
              
              const timer = setTimeout(() => {
                  const nextIdx = historyIndexRef.current + 1;
                  const newHistory = historyRef.current.slice(0, nextIdx);
                  const lastState = newHistory[newHistory.length - 1];
                  const currentStateStr = JSON.stringify({nodes, edges});
                  
                  if (!lastState || JSON.stringify(lastState) !== currentStateStr) {
                      newHistory.push({nodes: JSON.parse(JSON.stringify(nodes)), edges: JSON.parse(JSON.stringify(edges))});
                      if (newHistory.length > 50) newHistory.shift();
                      historyRef.current = newHistory;
                      historyIndexRef.current = newHistory.length - 1;
                      setCanUndo(historyIndexRef.current > 0);
                      setCanRedo(false);
                  }
              }, 500);

              return () => clearTimeout(timer);
          }, [nodes, edges]);

          const handleUndo = useCallback(() => {
              if (historyIndexRef.current > 0) {
                  isUndoRedoRef.current = true;
                  historyIndexRef.current -= 1;
                  const prevState = historyRef.current[historyIndexRef.current];
                  setNodes(prevState.nodes);
                  setEdges(prevState.edges);
                  setSelectedNodeIds([]);
                  setSelectedEdgeIds([]);
                  setCanUndo(historyIndexRef.current > 0);
                  setCanRedo(historyIndexRef.current < historyRef.current.length - 1);
              }
          }, []);

          const handleRedo = useCallback(() => {
              if (historyIndexRef.current < historyRef.current.length - 1) {
                  isUndoRedoRef.current = true;
                  historyIndexRef.current += 1;
                  const nextState = historyRef.current[historyIndexRef.current];
                  setNodes(nextState.nodes);
                  setEdges(nextState.edges);
                  setSelectedNodeIds([]);
                  setSelectedEdgeIds([]);
                  setCanUndo(historyIndexRef.current > 0);
                  setCanRedo(historyIndexRef.current < historyRef.current.length - 1);
              }
          }, []);

          useEffect(() => {
              const handleKeyDown = (e) => {
                  const isInputActive = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName);
                  const { nodes: currentNodes, edges: currentEdges, selectedNodeIds: currentSelectedNodes, selectedEdgeIds: currentSelectedEdges } = latestStateRef.current;

                  if (e.ctrlKey || e.metaKey) {
                      if (e.key.toLowerCase() === 'z') {
                          if (!isInputActive) e.preventDefault();
                          if (isInputActive) return;
                          
                          if (e.shiftKey) {
                              handleRedo();
                          } else {
                              handleUndo();
                          }
                      } else if (e.key.toLowerCase() === 'y') {
                          if (!isInputActive) e.preventDefault();
                          if (isInputActive) return;
                          
                          handleRedo();
                      } else if (e.key.toLowerCase() === 'c' && !isInputActive) {
                          e.preventDefault();
                          const copiedNodes = currentNodes.filter(n => currentSelectedNodes.includes(n.id));
                          const copiedEdges = currentEdges.filter(ed => 
                              currentSelectedEdges.includes(ed.id) || 
                              (currentSelectedNodes.includes(ed.source) && currentSelectedNodes.includes(ed.target))
                          );
                          clipboardRef.current = { nodes: JSON.parse(JSON.stringify(copiedNodes)), edges: JSON.parse(JSON.stringify(copiedEdges)) };
                      } else if (e.key.toLowerCase() === 'v' && !isInputActive) {
                          e.preventDefault();
                          if (clipboardRef.current.nodes.length === 0) return;
                          
                          const idMap = {};
                          const newNodes = clipboardRef.current.nodes.map(n => {
                              const newId = n.data.isChangeScene || n.data.isActionbar ? `logic_${Math.random().toString(36).substring(2, 6)}` : `scene_${Math.random().toString(36).substring(2, 6)}`;
                              idMap[n.id] = newId;
                              return { ...n, id: newId, position: { x: n.position.x + 40, y: n.position.y + 40 } };
                          });
                          
                          const newEdges = clipboardRef.current.edges.map(ed => {
                              const newSource = idMap[ed.source] || ed.source; 
                              const newTarget = idMap[ed.target] || ed.target;
                              return { ...ed, id: `edge_${Date.now()}_${Math.random().toString(36).substring(2,6)}`, source: newSource, target: newTarget };
                          }).filter(ed => ed.source && ed.target);
                          
                          setNodes(nds => [...nds, ...newNodes]);
                          setEdges(eds => [...eds, ...newEdges]);
                          setSelectedNodeIds(newNodes.map(n => n.id));
                          setSelectedEdgeIds(newEdges.map(e => e.id));
                      }
                  }
                  
                  if ((e.key === 'Delete' || e.key === 'Backspace') && !isInputActive) {
                      e.preventDefault();
                      if (currentSelectedNodes.length > 0) {
                          setNodes(nds => nds.filter(n => !currentSelectedNodes.includes(n.id)));
                          setEdges(eds => eds.filter(ed => !currentSelectedNodes.includes(ed.source) && !currentSelectedNodes.includes(ed.target)));
                          setSelectedNodeIds([]);
                      }
                      if (currentSelectedEdges.length > 0) {
                          setEdges(eds => eds.filter(ed => !currentSelectedEdges.includes(ed.id)));
                          setSelectedEdgeIds([]);
                      }
                  }
              };
              window.addEventListener('keydown', handleKeyDown);
              return () => window.removeEventListener('keydown', handleKeyDown);
          }, [handleUndo, handleRedo]);

          const handleCanvasMouseDown = (e) => {
            if (e.target === canvasContainerRef.current || e.target.tagName === 'DIV') {
                if (e.shiftKey) {
                    const rect = canvasContainerRef.current.getBoundingClientRect();
                    const logicalX = (e.clientX - rect.left - pan.x) / zoom;
                    const logicalY = (e.clientY - rect.top - pan.y) / zoom;
                    setSelectionBox({ startX: logicalX, startY: logicalY, currentX: logicalX, currentY: logicalY });
                } else {
                    setIsPanning(true);
                    setSelectedNodeIds([]);
                    setSelectedEdgeIds([]);
                }
            }
          };

          const handleWheel = (e) => {
            if (e.ctrlKey || e.metaKey || pdfMode) return; 
            const zoomSensitivity = 0.001;
            const delta = -e.deltaY * zoomSensitivity;
            setZoom(z => Math.min(Math.max(0.2, z + delta), 2));
          };

          const fitView = (currentNodes = nodes) => {
            if (currentNodes.length === 0 || !canvasContainerRef.current) return;
            const minX = Math.min(...currentNodes.map(n => n.position.x));
            const maxX = Math.max(...currentNodes.map(n => n.position.x)) + 256;
            const minY = Math.min(...currentNodes.map(n => n.position.y));
            const maxY = Math.max(...currentNodes.map(n => n.position.y)) + 144;
            
            const graphWidth = maxX - minX;
            const graphHeight = maxY - minY;
            const containerRect = canvasContainerRef.current.getBoundingClientRect();
            
            const zoomX = (containerRect.width - 100) / graphWidth;
            const zoomY = (containerRect.height - 100) / graphHeight;
            const newZoom = Math.min(Math.max(0.2, Math.min(zoomX, zoomY)), 1);
            setZoom(newZoom);
            
            const centerX = minX + (graphWidth / 2);
            const centerY = minY + (graphHeight / 2);
            setPan({
                x: (containerRect.width / 2) - (centerX * newZoom),
                y: (containerRect.height / 2) - (centerY * newZoom)
            });
          };

          const handleMouseMove = (e) => {
            if (!canvasContainerRef.current || pdfMode) return;
            
            if (isPanning) {
              setPan(p => ({ x: p.x + e.movementX, y: p.y + e.movementY }));
              return;
            }

            const rect = canvasContainerRef.current.getBoundingClientRect();
            const logicalX = (e.clientX - rect.left - pan.x) / zoom;
            const logicalY = (e.clientY - rect.top - pan.y) / zoom;
            setMousePos({ x: logicalX, y: logicalY });

            if (selectionBox) {
                const currentX = logicalX;
                const currentY = logicalY;
                setSelectionBox(prev => ({ ...prev, currentX, currentY }));
                
                const boxLeft = Math.min(selectionBox.startX, currentX);
                const boxRight = Math.max(selectionBox.startX, currentX);
                const boxTop = Math.min(selectionBox.startY, currentY);
                const boxBottom = Math.max(selectionBox.startY, currentY);
                
                const newSelectedNodeIds = nodes.filter(n => {
                    const nodeLeft = n.position.x;
                    const nodeRight = n.position.x + 256; 
                    const nodeTop = n.position.y;
                    const h = nodeHeights[n.id] || 144;
                    const nodeBottom = n.position.y + h; 
                    return !(nodeRight < boxLeft || nodeLeft > boxRight || nodeBottom < boxTop || nodeTop > boxBottom);
                }).map(n => n.id);
                
                setSelectedNodeIds(newSelectedNodeIds);
                return;
            }

            if (dragStartMouse) {
              const deltaX = logicalX - dragStartMouse.x;
              const deltaY = logicalY - dragStartMouse.y;
              
              setNodes(nds => nds.map(n => {
                  if (selectedNodeIds.includes(n.id) && initialNodePositions[n.id]) {
                      return { ...n, position: { x: initialNodePositions[n.id].x + deltaX, y: initialNodePositions[n.id].y + deltaY } };
                  }
                  return n;
              }));
              return;
            }
          };

          const handleNodeMouseDown = (e, node) => {
            e.stopPropagation();
            if (!canvasContainerRef.current) return;
            const rect = canvasContainerRef.current.getBoundingClientRect();
            const logicalX = (e.clientX - rect.left - pan.x) / zoom;
            const logicalY = (e.clientY - rect.top - pan.y) / zoom;

            let currentSelected = [...selectedNodeIds];
            if (e.shiftKey) {
                if (currentSelected.includes(node.id)) {
                    currentSelected = currentSelected.filter(id => id !== node.id);
                } else {
                    currentSelected.push(node.id);
                }
                setSelectedNodeIds(currentSelected);
            } else {
                if (!currentSelected.includes(node.id)) {
                    currentSelected = [node.id];
                    setSelectedNodeIds(currentSelected);
                }
            }
            
            setSelectedEdgeIds([]);

            setDragStartMouse({ x: logicalX, y: logicalY });
            const initialPos = {};
            nodes.forEach(n => {
                if (currentSelected.includes(n.id)) {
                    initialPos[n.id] = { ...n.position };
                }
            });
            setInitialNodePositions(initialPos);
          };

          const handleSourceMouseDown = (e, nodeId) => {
            e.stopPropagation();
            setConnectingFrom(nodeId);
          };

          const handleTargetMouseUp = (e, nodeId) => {
            e.stopPropagation();
            if (connectingFrom && connectingFrom !== nodeId) {
              const sourceNode = nodes.find(n => n.id === connectingFrom);
              const targetNode = nodes.find(n => n.id === nodeId);
              
              const isChainLink = sourceNode?.data.isChangeScene || sourceNode?.data.isActionbar;
              const targetIsLogic = targetNode?.data.isChangeScene || targetNode?.data.isActionbar;
              
              if (sourceNode?.data.isChangeScene && !targetIsLogic) {
                  setConnectingFrom(null);
                  return; 
              }

              if (sourceNode && !sourceNode.data.isChangeScene && !sourceNode.data.isActionbar) {
                  const currentEdgesCount = edges.filter(e => e.source === connectingFrom).length;
                  const hasClose = sourceNode.data.hasCloseButton ? 1 : 0;
                  if (currentEdgesCount + hasClose >= 6) {
                      setConnectingFrom(null);
                      return; 
                  }
              }

              const newEdge = {
                id: `edge_${Date.now()}`,
                source: connectingFrom,
                target: nodeId,
                data: isChainLink ? {} : { label: 'Continue', giveItem: '', soundId: '', commands: '', despawnCast: false }
              };
              setEdges(eds => [...eds, newEdge]);
              setSelectedEdgeIds([newEdge.id]);
              setSelectedNodeIds([]);
            }
            setConnectingFrom(null);
          };
          
          const handleMouseUp = (e) => {
            if (connectingFrom && e?.type === 'mouseup') {
              const sourceNode = nodes.find(n => n.id === connectingFrom);
              
              if (sourceNode && !sourceNode.data.isChangeScene && !sourceNode.data.isActionbar) {
                  const currentEdgesCount = edges.filter(ed => ed.source === connectingFrom).length;
                  const hasClose = sourceNode.data.hasCloseButton ? 1 : 0;
                  if (currentEdgesCount + hasClose >= 6) {
                      setDragStartMouse(null);
                      setSelectionBox(null);
                      setConnectingFrom(null);
                      setIsPanning(false);
                      return; 
                  }
              }

              const isChainLink = sourceNode?.data.isChangeScene || sourceNode?.data.isActionbar;

              const hash = Math.random().toString(36).substring(2, 6);
              const newNodeId = isChainLink ? `logic_${hash}` : `scene_${hash}`;
              
              let newNodeData = { text: 'Click to edit this new dialogue.', speakerId: activeActorId, hasCloseButton: false, closeButtonLabel: 'Close', despawnCast: false };
              if (sourceNode?.data.isChangeScene) {
                  newNodeData = { isChangeScene: true, targetNodeId: '', silentUpdate: true };
              } else if (sourceNode?.data.isActionbar) {
                  newNodeData = { isActionbar: true, actionbarText: '', targetPlayer: '@initiator', displaySlot: 'actionbar', textColor: '§f', subtitleColor: '§f' };
              }
              
              const newNode = {
                id: newNodeId,
                data: newNodeData,
                position: { x: mousePos.x - 128, y: mousePos.y - 72 },
              };
              
              const newEdge = {
                id: `edge_${Date.now()}`,
                source: connectingFrom,
                target: newNodeId,
                data: isChainLink ? {} : { label: 'Continue', giveItem: '', soundId: '', commands: '', despawnCast: false }
              };

              setNodes(nds => [...nds, newNode]);
              setEdges(eds => [...eds, newEdge]);
              setSelectedNodeIds([newNode.id]);
              setSelectedEdgeIds([]);
            }

            setDragStartMouse(null);
            setSelectionBox(null);
            setConnectingFrom(null);
            setIsPanning(false);
          };

          const handleAddActor = () => {
            if (cast.length >= 4) return;
            const newId = `char_${Date.now()}`;
            const newColor = defaultColors[cast.length];
            setCast([...cast, { id: newId, name: `NPC ${cast.length + 1}`, skinUrl: generateDefaultSkin(newColor), eggBase: newColor, eggOverlay: '#111111' }]);
            setActiveActorId(newId);
          };

          const updateActiveActor = (updates) => {
            setCast(cast.map(c => c.id === activeActorId ? { ...c, ...updates } : c));
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (event) => {
                updateActiveActor({ skinUrl: event.target.result });
                e.target.value = null; 
              };
              reader.readAsDataURL(file);
            }
          };

          const handleSkinDrop = (e) => {
            e.preventDefault();
            setIsDraggingSkin(false);
            const file = e.dataTransfer.files[0];
            if (file && (file.type === "image/png" || file.name.toLowerCase().endsWith('.png'))) {
              const reader = new FileReader();
              reader.onload = (event) => {
                updateActiveActor({ skinUrl: event.target.result });
              };
              reader.readAsDataURL(file);
            }
          };

          const updateNodeData = (id, newData) => {
            setNodes((nds) => nds.map((n) => {
              if (n.id === id) {
                return { ...n, data: { ...n.data, ...newData } };
              }
              return n;
            }));
          };

          const updateEdgeData = (id, newData) => {
            setEdges((eds) => eds.map((e) => {
              if (e.id === id) {
                return { ...e, data: { ...e.data, ...newData } };
              }
              return e;
            }));
          };

          const addDialogueNode = (type = 'scene') => {
            const hash = Math.random().toString(36).substring(2, 6);
            const id = (type === 'change' || type === 'actionbar') ? `logic_${hash}` : `scene_${hash}`;
            const scatterX = (Math.random() * 60) - 30;
            const scatterY = (Math.random() * 60) - 30;
            const rect = canvasContainerRef.current.getBoundingClientRect();
            const spawnX = ((rect.width / 2) - pan.x) / zoom - 128 + scatterX;
            const spawnY = ((rect.height / 2) - pan.y) / zoom - 72 + scatterY;

            let newNode = {
              id,
              position: { x: spawnX, y: spawnY },
              data: {}
            };

            if (type === 'start') {
              newNode.data = { sceneName: 'New Start', text: 'Click to edit this new starting dialogue.', speakerId: activeActorId, isStart: true, hasCloseButton: false, closeButtonLabel: 'Close', despawnCast: false };
            } else if (type === 'change') {
              newNode.data = { isChangeScene: true, targetNodeId: '', silentUpdate: true };
            } else if (type === 'actionbar') {
              newNode.data = { isActionbar: true, actionbarText: '', targetPlayer: '@initiator', displaySlot: 'actionbar', textColor: '§f', subtitleColor: '§f' };
            } else {
              newNode.data = { text: 'Click to edit this new dialogue.', speakerId: activeActorId, isStart: false, hasCloseButton: false, closeButtonLabel: 'Close', despawnCast: false };
            }

            setNodes((nds) => nds.concat(newNode));
            setSelectedNodeIds([newNode.id]);
            setSelectedEdgeIds([]);
          };

          const autoLayout = () => {
            if (nodes.length === 0) return;

            const levels = {};
            const inDegree = {};
            nodes.forEach(n => { inDegree[n.id] = 0; });
            edges.forEach(e => { if (inDegree[e.target] !== undefined) inDegree[e.target]++; });

            nodes.forEach(n => {
                if (n.data.isStart || inDegree[n.id] === 0) {
                    levels[n.id] = 0;
                } else {
                    levels[n.id] = -1;
                }
            });

            if (Object.values(levels).every(l => l === -1)) {
                levels[nodes[0].id] = 0;
            }

            let changed = true;
            let iterations = 0;
            const MAX_ITER = nodes.length + 5;
            while (changed && iterations < MAX_ITER) {
                changed = false;
                edges.forEach(e => {
                    const u = e.source;
                    const v = e.target;
                    if (levels[u] !== -1) {
                        if (levels[v] === -1 || levels[v] < levels[u] + 1) {
                            levels[v] = levels[u] + 1;
                            changed = true;
                        }
                    }
                });
                iterations++;
            }

            let maxFoundLevel = Math.max(...Object.values(levels).filter(l => l !== -1), 0);
            nodes.forEach(n => {
                if (levels[n.id] === -1) {
                    levels[n.id] = maxFoundLevel + 1;
                }
            });

            const levelGroups = [];
            let maxLevel = 0;
            nodes.forEach(n => {
                const lvl = levels[n.id];
                if (!levelGroups[lvl]) levelGroups[lvl] = [];
                levelGroups[lvl].push(n);
                if (lvl > maxLevel) maxLevel = lvl;
            });

            for (let i = 0; i <= maxLevel; i++) {
                if (!levelGroups[i]) levelGroups[i] = [];
            }

            const NODE_WIDTH = 320; 
            const NODE_HEIGHT = 300;

            const nodeX = {};
            levelGroups.forEach(layer => {
                layer.forEach((n, idx) => {
                    nodeX[n.id] = idx * NODE_WIDTH; 
                });
            });

            for (let iter = 0; iter < 100; iter++) {
                for (let i = 0; i <= maxLevel; i++) {
                    levelGroups[i].forEach(n => {
                        const parents = edges.filter(e => e.target === n.id).map(e => nodeX[e.source]).filter(x => x !== undefined);
                        const children = edges.filter(e => e.source === n.id).map(e => nodeX[e.target]).filter(x => x !== undefined);
                        
                        let targetX = nodeX[n.id];
                        if (parents.length > 0 || children.length > 0) {
                            const sum = [...parents, ...children].reduce((a,b)=>a+b, 0);
                            targetX = sum / (parents.length + children.length);
                        }
                        nodeX[n.id] = nodeX[n.id] * 0.5 + targetX * 0.5; 
                    });

                    levelGroups[i].sort((a,b) => nodeX[a.id] - nodeX[b.id]);
                    
                    let sumX = 0;
                    levelGroups[i].forEach(n => sumX += nodeX[n.id]);
                    const comBefore = levelGroups[i].length > 0 ? sumX / levelGroups[i].length : 0;

                    for (let j = 1; j < levelGroups[i].length; j++) {
                        const leftNode = levelGroups[i][j-1];
                        const rightNode = levelGroups[i][j];
                        if (nodeX[rightNode.id] < nodeX[leftNode.id] + NODE_WIDTH) {
                            nodeX[rightNode.id] = nodeX[leftNode.id] + NODE_WIDTH;
                        }
                    }

                    let sumXAfter = 0;
                    levelGroups[i].forEach(n => sumXAfter += nodeX[n.id]);
                    const comAfter = levelGroups[i].length > 0 ? sumXAfter / levelGroups[i].length : 0;

                    const drift = comAfter - comBefore;
                    levelGroups[i].forEach(n => nodeX[n.id] -= drift);
                }
            }

            let minX = Infinity;
            let maxX = -Infinity;
            Object.values(nodeX).forEach(x => {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
            });
            const graphCenter = (minX + maxX) / 2;

            const newNodes = nodes.map(node => {
              const lvl = levels[node.id];
              return { 
                ...node, 
                position: { x: nodeX[node.id] - graphCenter, y: lvl * NODE_HEIGHT } 
              };
            });

            setNodes(newNodes);
            setTimeout(() => fitView(newNodes), 50);
          };

          const calculateEdgePath = (startX, startY, endX, endY, edgeId) => {
              const yDiff = endY - startY;
              const isLongJump = yDiff > 350;
              
              let ctrlOffsetX = 0;
              if (isLongJump && Math.abs(startX - endX) < 150) {
                  let hash = 0;
                  for (let i = 0; i < edgeId.length; i++) hash += edgeId.charCodeAt(i);
                  ctrlOffsetX = (hash % 2 === 0 ? 1 : -1) * 300;
              }
              
              const c1X = startX + ctrlOffsetX;
              const c1Y = startY + 80;
              const c2X = endX + ctrlOffsetX;
              const c2Y = endY - 80;
              
              const pathD = `M ${startX} ${startY} C ${c1X} ${c1Y}, ${c2X} ${c2Y}, ${endX} ${endY}`;
              const midX = 0.125 * startX + 0.375 * c1X + 0.375 * c2X + 0.125 * endX;
              const midY = 0.125 * startY + 0.375 * c1Y + 0.375 * c2Y + 0.125 * endY;

              return { pathD, midX, midY };
          };

          const saveProject = () => {
            const projectData = {
              version: 1,
              packName,
              cast,
              nodes,
              edges
            };
            const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${packName ? packName.replace(/\s+/g, '_') : "my_project"}.mdf`;
            link.click();
          };

          const loadProject = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const data = JSON.parse(event.target.result);
                if (data.packName !== undefined) setPackName(data.packName);
                if (data.cast && Array.isArray(data.cast)) {
                  setCast(data.cast);
                  setActiveActorId(data.cast[0]?.id || 'char_1');
                }
                if (data.nodes && Array.isArray(data.nodes)) setNodes(data.nodes);
                if (data.edges && Array.isArray(data.edges)) setEdges(data.edges);
                setSelectedNodeIds([]);
                setSelectedEdgeIds([]);
                setLoadError('');
              } catch (err) {
                console.error("Failed to load project:", err);
                setLoadError('Invalid project file!');
                setTimeout(() => setLoadError(''), 3000);
              }
            };
            reader.readAsText(file);
            e.target.value = null;
          };

          const exportPDF = async () => {
            if (!packName || packName.trim() === '') {
                setNameError(true);
                return;
            }
            if (!window.jspdf || !window.html2canvas) {
                console.warn("PDF libraries loading...");
                return;
            }
            setIsExporting(true);
            autoLayout();
            
            setTimeout(() => {
                setPdfMode(true);
                setSelectedNodeIds([]);
                setSelectedEdgeIds([]);
                
                setTimeout(async () => {
                    try {
                        const canvasEl = document.getElementById('pdf-capture-area');
                        const canvasImage = await window.html2canvas(canvasEl, {
                            backgroundColor: '#ffffff',
                            scale: 2, 
                            useCORS: true,
                            logging: false
                        });

                        const imgData = canvasImage.toDataURL('image/jpeg', 0.95);
                        const imgWidth = canvasImage.width;
                        const imgHeight = canvasImage.height;
                        
                        const pdf = new window.jspdf.jsPDF({
                            orientation: imgWidth > imgHeight ? 'l' : 'p',
                            unit: 'px',
                            format: [imgWidth, imgHeight]
                        });
                        
                        pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
                        pdf.save(`${packName.replace(/\s+/g, '_')}_Dialogue_Blueprint.pdf`);
                    } catch (error) {
                        console.error("PDF Generation Error:", error);
                    } finally {
                        setPdfMode(false);
                        setIsExporting(false);
                    }
                }, 2000); 
            }, 600);
          };

          const generateDialogueScenesData = (safeName) => {
              const getDespawnCommands = () => {
                  const cmds = [];
                  cast.forEach(a => {
                      cmds.push(`/tp @e[type=forge:${safeName}_${a.id}] ~ ~-20 ~`);
                      cmds.push(`/event entity @e[type=forge:${safeName}_${a.id}] forge:trigger_despawn`);
                  });
                  return cmds;
              };

              const actionbarNodes = nodes.filter(n => n.data.isActionbar && n.data.displaySlot !== 'title' && n.data.actionbarText && n.data.actionbarText.trim() !== '');
              const allActionbarTags = actionbarNodes.map(n => `forge_ab_${n.id}`);

              return nodes.filter(n => !n.data.isChangeScene && !n.data.isActionbar).map(node => {
                const currentActor = cast.find(c => c.id === node.data.speakerId) || cast[0];
                const outgoingEdges = edges.filter(e => e.source === node.id);
                
                const buttons = outgoingEdges.map(e => {
                  let currentNode = nodes.find(n => n.id === e.target);
                  let safetyVisited = new Set();
                  let actionCommands = [];
                  let finalUiNode = null;
                  let activeNpcId = currentActor.id;

                  while (currentNode) {
                      if (safetyVisited.has(currentNode.id)) break;
                      safetyVisited.add(currentNode.id);

                      if (currentNode.data.isChangeScene) {
                          const targetStartId = currentNode.data.targetNodeId;
                          if (targetStartId) {
                              const tsNode = nodes.find(n => n.id === targetStartId);
                              if (tsNode) {
                                  const tActor = cast.find(c => c.id === tsNode.data.speakerId) || cast[0];
                                  activeNpcId = tActor.id; 
                                  if (currentNode.data.silentUpdate) {
                                      actionCommands.push(`/dialogue change @e[type=forge:${safeName}_${tActor.id}] ${safeName}_${targetStartId} @initiator`);
                                  } else {
                                      actionCommands.push(`/dialogue change @e[type=forge:${safeName}_${tActor.id},c=1] ${safeName}_${targetStartId} @initiator`);
                                      actionCommands.push(`/dialogue open @e[type=forge:${safeName}_${tActor.id},c=1] @initiator ${safeName}_${targetStartId}`);
                                  }
                              }
                          }
                          const nextEdge = edges.find(edge => edge.source === currentNode.id);
                          currentNode = nextEdge ? nodes.find(n => n.id === nextEdge.target) : null;
                      } else if (currentNode.data.isActionbar) {
                          const text = currentNode.data.actionbarText;
                          const subtitle = currentNode.data.subtitleText;
                          const target = currentNode.data.targetPlayer || '@initiator';
                          const displaySlot = currentNode.data.displaySlot || 'actionbar';
                          const tColor = currentNode.data.textColor || '§f';
                          const sColor = currentNode.data.subtitleColor || '§f';

                          if (displaySlot === 'title') {
                              if (text && text.trim() !== '') {
                                  if (subtitle && subtitle.trim() !== '') {
                                      actionCommands.push(`/title ${target} subtitle ${sColor}${subtitle.trim()}`);
                                  }
                                  actionCommands.push(`/title ${target} title ${tColor}${text.trim()}`);
                              } else {
                                  actionCommands.push(`/title ${target} clear`);
                              }
                          } else {
                              allActionbarTags.forEach(tag => {
                                  actionCommands.push(`/tag ${target} remove ${tag}`);
                              });

                              if (text && text.trim() !== '') {
                                  actionCommands.push(`/tag ${target} add forge_ab_${currentNode.id}`);
                              } else {
                                  actionCommands.push(`/titleraw ${target} actionbar {"rawtext":[{"text":""}]}`);
                              }
                          }
                          const nextEdge = edges.find(edge => edge.source === currentNode.id);
                          currentNode = nextEdge ? nodes.find(n => n.id === nextEdge.target) : null;
                      } else {
                          finalUiNode = currentNode;
                          break;
                      }
                  }

                  const customCommands = e.data.commands ? e.data.commands.split('\n').filter(cmd => cmd.trim() !== '') : [];
                  const generatedCommands = [];
                  if (e.data.giveItem) generatedCommands.push(`/give @initiator ${e.data.giveItem}`);
                  if (e.data.soundId) generatedCommands.push(`/playsound ${e.data.soundId} @initiator`);
                  
                  let finalCommands = [];
                  if (e.data.despawnCast) {
                      finalCommands = [
                          ...generatedCommands,
                          ...customCommands,
                          ...actionCommands,
                          ...getDespawnCommands()
                      ];
                  } else {
                      finalCommands = [ ...actionCommands ];
                      
                      if (finalUiNode) {
                          const targetActor = cast.find(c => c.id === finalUiNode.data.speakerId) || cast[0];
                          finalCommands.push(`/event entity @e[type=forge:${safeName}_${targetActor.id},c=1] forge:play_talking`);
                          finalCommands.push(`/dialogue open @e[type=forge:${safeName}_${targetActor.id},c=1] @initiator ${safeName}_${finalUiNode.id}`);
                      }
                      
                      finalCommands.push(...generatedCommands, ...customCommands);
                  }

                  return {
                    name: e.data.label || "Continue",
                    commands: finalCommands.length > 0 ? finalCommands : ["/say Continuing..."]
                  };
                });

                if (node.data.hasCloseButton || outgoingEdges.length === 0) {
                  const closeBtn = {
                      name: node.data.closeButtonLabel || "Close"
                  };
                  if (node.data.despawnCast) {
                      closeBtn.commands = getDespawnCommands();
                  }
                  buttons.push(closeBtn);
                }

                const safelyCappedButtons = buttons.slice(0, 6);

                return {
                  scene_tag: `${safeName}_${node.id}`,
                  npc_name: currentActor.name,
                  text: node.data.text,
                  buttons: safelyCappedButtons.length > 0 ? safelyCappedButtons : undefined
                };
              });
          };

          const exportAddon = async () => {
            if (!packName || packName.trim() === '') {
                setNameError(true);
                return;
            }
            
            setIsExporting(true);
            try {
                const zip = new window.JSZip();
                
                const bpUuid1 = generateUUID(); const bpUuid2 = generateUUID();
                const rpUuid1 = generateUUID(); const rpUuid2 = generateUUID();
                const hash = Math.random().toString(36).substring(2, 6);
                const safeName = (packName || "custom").toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + hash;

                const bpFolder = zip.folder(`${packName.replace(/\s+/g, '_')}_BP`);
                const rpFolder = zip.folder(`${packName.replace(/\s+/g, '_')}_RP`);

                const packIconBase64 = generatePackIcon();
                
                bpFolder.file("manifest.json", JSON.stringify({
                  format_version: 2,
                  header: { name: `${packName} BP`, description: "Multi-NPC Dialogue Tree", uuid: bpUuid1, version: [1, 0, 0], min_engine_version: [1, 20, 0] },
                  modules: [ { type: "data", uuid: bpUuid2, version: [1, 0, 0] } ],
                  dependencies: [ { uuid: rpUuid1, version: [1, 0, 0] } ]
                }, null, 2));
                bpFolder.file("pack_icon.png", packIconBase64, {base64: true});

                rpFolder.file("manifest.json", JSON.stringify({
                  format_version: 2,
                  header: { name: `${packName} RP`, description: "NPC Visuals and Skins", uuid: rpUuid1, version: [1, 0, 0], min_engine_version: [1, 20, 0] },
                  modules: [ { type: "resources", uuid: rpUuid2, version: [1, 0, 0] } ]
                }, null, 2));
                rpFolder.file("pack_icon.png", packIconBase64, {base64: true});

                let langFileStr = '';

                const actionbarNodes = nodes.filter(n => n.data.isActionbar && n.data.displaySlot !== 'title' && n.data.actionbarText && n.data.actionbarText.trim() !== '');
                const allActionbarTags = actionbarNodes.map(n => `forge_ab_${n.id}`);

                bpFolder.file("functions/tick.json", JSON.stringify({
                    values: ["forge_actionbars"]
                }, null, 2));

                let tickCommands = "";
                actionbarNodes.forEach(n => {
                    const color = n.data.textColor || '§f';
                    tickCommands += `title @a[tag=forge_ab_${n.id}] actionbar ${color}${n.data.actionbarText.trim()}\n`;
                });
                if (tickCommands === "") {
                    tickCommands = "# No persistent actionbars configured\n";
                }
                bpFolder.file("functions/forge_actionbars.mcfunction", tickCommands);

                const mainStartNode = nodes.find(n => n.data.isStart) || nodes[0];

                for (const actor of cast) {
                  const entityId = `forge:${safeName}_${actor.id}`;
                  const fileName = `${safeName}_${actor.id}`;
                  
                  const actorStartNode = nodes.find(n => n.data.isStart && n.data.speakerId === actor.id);

                  langFileStr += `item.spawn_egg.entity.${entityId}.name=${actor.name}\nentity.${entityId}.name=${actor.name}\n`;

                  const spawnCommands = [];
                  if (actorStartNode) {
                      spawnCommands.push(`dialogue change @s ${safeName}_${actorStartNode.id}`);
                  } else {
                      spawnCommands.push(`dialogue change @s ${safeName}_${mainStartNode.id}`);
                  }

                  const componentGroups = {
                    "forge:npc_init": {
                      "minecraft:npc": {
                        "npc_data": {
                          "portrait_offsets": {
                            "translate": [-1.5, 5, 0],
                            "scale": 2.4
                          }
                        }
                      }
                    },
                    "forge:despawn_task": {
                      "minecraft:instant_despawn": {}
                    }
                  };
                  
                  const randomizeTalk = [];
                  for (let i = 1; i <= 10; i++) {
                    componentGroups[`forge:talk_${i}`] = { "minecraft:variant": { "value": i } };
                    const toRemove = [];
                    for (let j = 1; j <= 10; j++) if (j !== i) toRemove.push(`forge:talk_${j}`);
                    randomizeTalk.push({
                      "weight": 1,
                      "add": { "component_groups": [`forge:talk_${i}`] },
                      "remove": { "component_groups": toRemove }
                    });
                  }

                  const entityEvents = {
                    "minecraft:entity_spawned": {
                      "sequence": [
                        { "add": { "component_groups": ["forge:npc_init", "forge:despawn_task"] } },
                        { "filters": { "test": "has_ability", "subject": "nearest_player", "value": "worldbuilder" }, "remove": { "component_groups": ["forge:despawn_task"] } },
                        { "queue_command": { "command": spawnCommands } }
                      ]
                    },
                    "forge:play_talking": {
                      "randomize": randomizeTalk
                    },
                    "forge:trigger_despawn": {
                      "add": { "component_groups": ["forge:despawn_task"] }
                    }
                  };

                  bpFolder.file(`entities/${fileName}.json`, JSON.stringify({
                    format_version: "1.20.0",
                    "minecraft:entity": {
                      description: { identifier: entityId, is_spawnable: true, is_summonable: true, is_experimental: false },
                      components: {
                        "minecraft:collision_box": { "width": 0.6, "height": 1.9 },
                        "minecraft:health": { "value": 1, "max": 1 },
                        "minecraft:physics": { "has_gravity": true, "has_collision": true },
                        "minecraft:pushable": { "is_pushable": false, "is_pushable_by_piston": false },
                        "minecraft:damage_sensor": {
                          "triggers": [
                            { "on_damage": { "filters": { "test": "has_ability", "subject": "other", "value": "worldbuilder" } }, "deals_damage": true },
                            { "cause": "all", "deals_damage": false }
                          ]
                        },
                        "minecraft:nameable": { "always_show": true, "allow_name_tags": true },
                        "minecraft:behavior.look_at_player": { "priority": 1, "look_distance": 8, "probability": 1.0 },
                        "minecraft:type_family": { "family": ["npc", "mob"] }
                      },
                      component_groups: componentGroups,
                      events: entityEvents
                    }
                  }, null, 2));

                  const animateArray = [ "look_at_target", "move" ];
                  const animationsObject = {
                    "look_at_target": "animation.humanoid.look_at_target",
                    "move": "animation.humanoid.move"
                  };
                  for (let i = 1; i <= 10; i++) {
                    animateArray.push({ [`talking_${i}`]: `query.variant == ${i}` });
                    animationsObject[`talking_${i}`] = "animation.npc.speech";
                  }

                  rpFolder.file(`entity/${fileName}.entity.json`, JSON.stringify({
                    format_version: "1.20.0",
                    "minecraft:client_entity": {
                      description: {
                        identifier: entityId,
                        materials: { default: "entity_alphatest" },
                        textures: { default: `textures/entity/${fileName}` },
                        geometry: { default: "geometry.humanoid.custom" },
                        scripts: {
                          pre_animation: [ "variable.tcos0 = (Math.cos(query.modified_distance_moved * 38.17) * query.modified_move_speed / variable.gliding_speed_value) * 57.3;" ],
                          animate: animateArray
                        },
                        animations: animationsObject,
                        render_controllers: [ "controller.render.default" ],
                        spawn_egg: {
                          base_color: actor.eggBase,
                          overlay_color: actor.eggOverlay
                        }
                      }
                    }
                  }, null, 2));

                  const res = await fetch(actor.skinUrl);
                  const skinBlob = await res.blob();
                  rpFolder.file(`textures/entity/${fileName}.png`, skinBlob);
                }

                rpFolder.file("texts/en_US.lang", langFileStr);

                const dialogueScenes = generateDialogueScenesData(safeName);

                bpFolder.file(`dialogue/scenes.json`, JSON.stringify({
                  format_version: "1.17",
                  "minecraft:npc_dialogue": { scenes: dialogueScenes }
                }, null, 2));

                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${packName.replace(/\s+/g, '_')}.mcaddon`;
                link.click();
            } catch (err) {
                console.error("Failed to generate addon:", err);
            } finally {
                setIsExporting(false);
            }
          };

          const handleCopyCode = () => {
            const codeStr = JSON.stringify({
              format_version: "1.17",
              "minecraft:npc_dialogue": { 
                scenes: generateDialogueScenesData((packName || "custom").toLowerCase().replace(/[^a-z0-9]/g, '_') + '_preview') 
              }
            }, null, 2);
            
            const textArea = document.createElement("textarea");
            textArea.value = codeStr;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                setIsCopied(true);
                setTimeout(() => setIsCopied(false), 2000);
            } catch (err) {
                console.error('Failed to copy', err);
            }
            document.body.removeChild(textArea);
          };

          const initiateDialogue = (npcId) => {
              const activeStartId = npcStates[npcId];
              if (activeStartId) {
                  advancePlaytest(activeStartId);
              } else {
                  const fallbackStart = nodes.find(n => n.data.isStart && n.data.speakerId === npcId);
                  if (fallbackStart) advancePlaytest(fallbackStart.id);
              }
          };

          const advancePlaytest = (targetId) => {
              let actualTarget = nodes.find(n => n.id === targetId);
              let visited = new Set();
              
              let currentOverlay = { ...playtestOverlay };
              let newNpcStates = { ...npcStates };
              let forceJumpTo = null;
              
              while (actualTarget && (actualTarget.data.isChangeScene || actualTarget.data.isActionbar)) {
                  if (visited.has(actualTarget.id)) break;
                  visited.add(actualTarget.id);
                  
                  if (actualTarget.data.isActionbar) {
                      if (actualTarget.data.displaySlot === 'title') {
                          currentOverlay.title = actualTarget.data.actionbarText || '';
                          currentOverlay.titleColor = actualTarget.data.textColor || '§f';
                          currentOverlay.subtitle = actualTarget.data.subtitleText || '';
                          currentOverlay.subtitleColor = actualTarget.data.subtitleColor || '§f';
                      } else {
                          currentOverlay.actionbar = actualTarget.data.actionbarText || '';
                          currentOverlay.actionbarColor = actualTarget.data.textColor || '§f';
                      }
                  } else if (actualTarget.data.isChangeScene) {
                      const targetStartId = actualTarget.data.targetNodeId;
                      if (targetStartId) {
                          const tsNode = nodes.find(n => n.id === targetStartId);
                          if (tsNode) {
                              newNpcStates[tsNode.data.speakerId] = targetStartId;
                              if (!actualTarget.data.silentUpdate) {
                                  forceJumpTo = targetStartId;
                              }
                          }
                      }
                  }

                  const nextEdge = edges.find(edge => edge.source === actualTarget.id);
                  if (nextEdge) {
                      actualTarget = nodes.find(n => n.id === nextEdge.target);
                  } else {
                      actualTarget = null;
                      break;
                  }
              }
              
              setPlaytestOverlay(currentOverlay);
              setNpcStates(newNpcStates);
              
              if (forceJumpTo) {
                  setPreviewSceneId(forceJumpTo);
              } else if (actualTarget && !actualTarget.data.isChangeScene && !actualTarget.data.isActionbar) {
                  setPreviewSceneId(actualTarget.id);
              } else {
                  setPreviewSceneId(null); 
              }
          };

          const currentPreviewNode = nodes.find(n => n.id === previewSceneId) || nodes[0];
          const previewOptions = edges.filter(e => e.source === previewSceneId);
          const previewActor = cast.find(c => c.id === currentPreviewNode?.data?.speakerId) || cast[0];

          const activeNode = selectedNodeIds.length === 1 ? nodes.find(n => n.id === selectedNodeIds[0]) : null;
          const activeEdge = selectedEdgeIds.length === 1 && selectedNodeIds.length === 0 ? edges.find(e => e.id === selectedEdgeIds[0]) : null;
          
          let isEdgeFromLogicNode = false;
          if (activeEdge) {
              const sourceNode = nodes.find(n => n.id === activeEdge.source);
              if (sourceNode?.data.isChangeScene || sourceNode?.data.isActionbar) {
                  isEdgeFromLogicNode = true;
              }
          }

          const minX = nodes.length > 0 ? Math.min(...nodes.map(n => n.position.x)) : 0;
          const minY = nodes.length > 0 ? Math.min(...nodes.map(n => n.position.y)) : 0;
          const graphWidth = nodes.length > 0 ? Math.max(...nodes.map(n => n.position.x)) - minX + 600 : 800;
          const graphHeight = nodes.length > 0 ? Math.max(...nodes.map(n => n.position.y)) - minY + 500 : 600;

          const outgoingEdgesCount = activeNode ? edges.filter(e => e.source === activeNode.id).length : 0;
          const maxEdgesReached = outgoingEdgesCount >= 6 && !(activeNode?.data?.hasCloseButton ?? false);

          const generatePlaytestButtons = () => {
              const allButtons = [
                  ...previewOptions.map((edge, idx) => (
                      <button 
                          key={idx} 
                          onClick={() => advancePlaytest(edge.target)} 
                          className="w-full bg-[#c6c6c6] border-[3px] border-[#1e1e1e] shadow-[inset_3px_3px_0px_#ffffff,inset_-3px_-3px_0px_#555555] active:shadow-[inset_3px_3px_0px_#555555,inset_-3px_-3px_0px_#ffffff] py-2.5 px-3 text-center text-[#1e1e1e] text-lg transition-all focus:outline-none whitespace-nowrap overflow-hidden text-ellipsis font-bold"
                      >
                          {edge.data.label || "Continue"}
                      </button>
                  ))
              ];
              
              if (currentPreviewNode.data.hasCloseButton || previewOptions.length === 0) {
                  allButtons.push(
                      <button 
                          key="close_btn" 
                          onClick={() => setPreviewSceneId(null)} 
                          className="w-full bg-[#c6c6c6] border-[3px] border-[#1e1e1e] shadow-[inset_3px_3px_0px_#ffffff,inset_-3px_-3px_0px_#555555] active:shadow-[inset_3px_3px_0px_#555555,inset_-3px_-3px_0px_#ffffff] py-2.5 px-3 text-center text-[#1e1e1e] text-lg transition-all focus:outline-none whitespace-nowrap overflow-hidden text-ellipsis font-bold"
                      >
                          {currentPreviewNode.data.closeButtonLabel || "Close"}
                      </button>
                  );
              }
              
              return allButtons.slice(0, 6);
          };

          return (
            <div className="flex h-screen w-screen bg-[#1e1e1e] font-sans text-gray-200 overflow-hidden">
              
              {pdfMode && (
                <div id="pdf-capture-area" className="absolute top-0 left-0 bg-white p-12 z-[100] flex flex-col gap-12 font-sans" style={{ minWidth: '100vw', minHeight: '100vh', width: 'max-content', height: 'max-content' }}>
                  <div className="flex flex-col gap-4 border-b-4 border-gray-200 pb-8">
                     <h1 className="text-6xl font-black text-gray-800 tracking-tight">{packName}</h1>
                     <h2 className="text-2xl font-bold text-gray-400 uppercase tracking-widest">Dialogue Blueprint & Roster</h2>
                     
                     <div className="flex flex-wrap gap-8 mt-6">
                        {cast.map(actor => (
                           <div key={`pdf_actor_${actor.id}`} className="flex items-center gap-6 bg-gray-50 p-4 rounded-xl border-2 border-gray-200 shadow-sm pr-12">
                              <div className="w-[120px] h-[160px] bg-gray-200 rounded-lg overflow-hidden border-2 border-gray-300 flex items-center justify-center">
                                 <SkinViewer skinUrl={actor.skinUrl} animation="idle" camX={-15} camY={12} camZ={40} zoom={0.6} width={120} height={160} />
                              </div>
                              <div className="flex flex-col gap-5">
                                 <span className="text-3xl font-bold text-gray-800 pb-1">{actor.name}</span>
                                 <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full border-[3px] border-gray-300 shadow-inner" style={{backgroundColor: actor.eggBase}}></div>
                                    <div className="w-8 h-8 rounded-full border-[3px] border-gray-300 shadow-inner" style={{backgroundColor: actor.eggOverlay}}></div>
                                 </div>
                              </div>
                           </div>
                        ))}
                     </div>
                  </div>

                  <div className="relative mt-8" style={{ width: graphWidth, height: graphHeight }}>
                      <svg className="absolute inset-0 pointer-events-none" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
                         {edges.map(edge => {
                             const sourceNode = nodes.find(n => n.id === edge.source);
                             const targetNode = nodes.find(n => n.id === edge.target);
                             if (!sourceNode || !targetNode) return null;
                             
                             const sEl = document.getElementById(`node_${sourceNode.id}`);
                             const sHeight = sEl ? sEl.offsetHeight : 144;

                             const startX = sourceNode.position.x - minX + 128;
                             const startY = sourceNode.position.y - minY + sHeight;
                             const endX = targetNode.position.x - minX + 128;
                             const endY = targetNode.position.y - minY;
                             
                             const isChainLink = sourceNode.data.isChangeScene || sourceNode.data.isActionbar;
                             const linkColor = sourceNode.data.isActionbar ? "#06b6d4" : "#8b5cf6";
                             const { pathD } = calculateEdgePath(startX, startY, endX, endY, edge.id);
                             
                             return <path key={`pdf_edge_${edge.id}`} d={pathD} stroke={isChainLink ? linkColor : "#888"} strokeWidth={isChainLink ? "3" : "4"} strokeDasharray="none" fill="none" />;
                         })}
                      </svg>

                      <div className="absolute inset-0 pointer-events-none z-10" style={{ overflow: "visible" }}>
                          {edges.map(edge => {
                           const sourceNode = nodes.find(n => n.id === edge.source);
                           const targetNode = nodes.find(n => n.id === edge.target);
                           if (!sourceNode || !targetNode || sourceNode.data.isChangeScene || sourceNode.data.isActionbar) return null;
                           
                           const sEl = document.getElementById(`node_${sourceNode.id}`);
                           const sHeight = sEl ? sEl.offsetHeight : 144;

                           const startX = sourceNode.position.x - minX + 128;
                           const startY = sourceNode.position.y - minY + sHeight;
                           const endX = targetNode.position.x - minX + 128;
                           const endY = targetNode.position.y - minY;
                           
                           const { midX, midY } = calculateEdgePath(startX, startY, endX, endY, edge.id);

                           return (
                              <div key={`pdf_label_${edge.id}`} className="absolute bg-white text-gray-800 px-3 py-1.5 rounded-md text-sm font-bold shadow-md border-2 border-gray-300" style={{ left: midX, top: midY, transform: 'translate(-50%, -50%)' }}>
                                  {edge.data.label || 'Continue'}
                              </div>
                           )
                          })}
                      </div>

                      {nodes.map(node => {
                          if (node.data.isChangeScene) {
                              const targetNode = nodes.find(n => n.id === node.data.targetNodeId);
                              const targetName = targetNode ? `${targetNode.data.sceneName || 'Start'} (${targetNode.id.substring(6,10)})` : "Unassigned";
                              return (
                                  <div key={`pdf_node_${node.id}`} id={`node_${node.id}`} className="absolute w-64 p-0 rounded-xl border-4 shadow-xl bg-[#2d1b4e] border-[#4c1d95]" style={{ left: node.position.x - minX, top: node.position.y - minY }}>
                                      <div className="bg-[#1e1e1e] p-3 flex items-center justify-between border-b-4 border-[#151515] rounded-t-lg">
                                          <div className="flex items-center gap-2">
                                              <div className="w-4 h-4 rounded-full border-2 border-black shadow-inner bg-purple-500" />
                                              <span className="text-gray-200 text-sm font-bold uppercase tracking-wider">Change Scene</span>
                                          </div>
                                          <span className="text-xs text-gray-500 font-mono">{node.id.substring(5,9)}</span>
                                      </div>
                                      <div className="p-4 flex flex-col gap-3">
                                          <div className="bg-[#1a1033] px-3 py-2 text-white border-2 border-[#151515] rounded-md shadow-inner text-sm font-bold text-center truncate">
                                              Jumps to: {targetName}
                                          </div>
                                      </div>
                                      <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-gray-400 border-[3px] border-[#151515] rounded-sm" />
                                  </div>
                              );
                          } else if (node.data.isActionbar) {
                              return (
                                  <div key={`pdf_node_${node.id}`} id={`node_${node.id}`} className="absolute w-64 p-0 rounded-xl border-4 shadow-xl bg-[#083344] border-[#0891b2]" style={{ left: node.position.x - minX, top: node.position.y - minY }}>
                                      <div className="bg-[#1e1e1e] p-3 flex items-center justify-between border-b-4 border-[#151515] rounded-t-lg">
                                          <div className="flex items-center gap-2">
                                              <div className="w-4 h-4 rounded-full border-2 border-black shadow-inner bg-cyan-500" />
                                              <span className="text-gray-200 text-sm font-bold uppercase tracking-wider">Screen Text</span>
                                          </div>
                                          <span className="text-xs text-gray-500 font-mono">{node.id.substring(6,10)}</span>
                                      </div>
                                      <div className="p-4 flex flex-col gap-3">
                                          <div className="flex justify-between items-end mb-1">
                                              <div className="text-[10px] text-gray-400 uppercase font-bold tracking-wider">{node.data.displaySlot === 'title' ? 'Title:' : 'Actionbar:'}</div>
                                              <div className="text-[9px] text-cyan-500 font-bold uppercase bg-[#0f172a] px-1.5 py-0.5 rounded border border-[#151515]">{node.data.targetPlayer || '@initiator'}</div>
                                          </div>
                                          <div className="bg-[#0f172a] px-3 py-2 border-2 border-[#151515] rounded-md shadow-inner text-sm font-bold text-center truncate italic" style={{ color: getColorHex(node.data.textColor || '§f') }}>
                                              {node.data.actionbarText ? `"${node.data.actionbarText}"` : "CLEAR TEXT"}
                                          </div>
                                          {node.data.displaySlot === 'title' && node.data.subtitleText && (
                                              <div className="bg-[#0f172a] px-3 py-1.5 border-2 border-[#151515] rounded-md shadow-inner text-xs font-bold text-center truncate italic" style={{ color: getColorHex(node.data.subtitleColor || '§f') }}>
                                                  Sub: "{node.data.subtitleText}"
                                              </div>
                                          )}
                                      </div>
                                      <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-gray-400 border-[3px] border-[#151515] rounded-sm" />
                                      <div className="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-6 h-6 bg-yellow-500 border-[3px] border-[#151515] rounded-sm" />
                                  </div>
                              );
                          }

                          const nodeActor = cast.find(c => c.id === node.data.speakerId) || cast[0];
                          return (
                          <div key={`pdf_node_${node.id}`} id={`node_${node.id}`} className="absolute w-64 p-0 rounded-xl border-4 shadow-xl bg-[#2c2c2c] border-[#4a4a4a]" style={{ left: node.position.x - minX, top: node.position.y - minY }}>
                              <div className="bg-[#1e1e1e] p-3 flex items-center justify-between border-b-4 border-[#151515] rounded-t-lg">
                                  <div className="flex items-center gap-2">
                                      <div className={`w-4 h-4 rounded-full border-2 border-black shadow-inner ${node.data.isStart ? 'bg-green-500' : 'bg-blue-500'}`} />
                                      <span className="text-gray-200 text-sm font-bold uppercase tracking-wider">{node.data.isStart ? (node.data.sceneName || 'Start Scene') : 'Scene'}</span>
                                  </div>
                                  <span className="text-xs text-gray-500 font-mono">{node.id.substring(6,10)}</span>
                              </div>
                              <div className="p-4 flex flex-col gap-3">
                                  <div className="bg-[#3c3c3c] px-3 py-2 text-white border-2 border-[#151515] rounded-md shadow-inner text-sm font-bold flex justify-between items-center">
                                      <span>{nodeActor.name}</span>
                                      <div className="w-3 h-3 rounded-full shadow-sm border border-black" style={{backgroundColor: nodeActor.eggBase}} />
                                  </div>
                                  <div className="bg-[#3c3c3c] px-3 pt-2 pb-3 text-gray-200 border-2 border-[#151515] rounded-md shadow-inner text-sm italic whitespace-pre-wrap flex-1">
                                      "{node.data.text}"
                                  </div>
                              </div>
                              {!node.data.isStart && <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-gray-400 border-[3px] border-[#151515] rounded-sm" />}
                              <div className="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-6 h-6 bg-yellow-500 border-[3px] border-[#151515] rounded-sm" />
                          </div>
                      )})}
                  </div>
                </div>
              )}

              <aside className="w-80 bg-[#252526] border-r border-[#333] flex flex-col shadow-2xl z-20">
                <div className="p-4 border-b border-[#333] bg-[#1e1e1e]">
                  <h1 className="text-lg font-black text-white flex items-center gap-2">
                    <BoxIcon size={24} className="text-yellow-500" /> CLEVERLIKE DIALOGUE FORGE
                  </h1>
                  <p className="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-widest">Bedrock Addon Creator</p>
                </div>

                <div className="p-4 flex-1 overflow-y-auto space-y-4">
                  <section className="space-y-2">
                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                      <Settings size={14} /> Pack Details
                    </h3>
                    <div className="space-y-1">
                      <label className="text-[10px] font-bold text-gray-400 uppercase">Addon Name</label>
                      <input 
                        className={`w-full bg-[#333] border ${nameError ? 'border-red-500' : 'border-[#444]'} rounded px-3 py-1.5 text-sm focus:border-yellow-500 focus:outline-none transition-colors`}
                        placeholder="e.g. MyDialoguePack"
                        value={packName}
